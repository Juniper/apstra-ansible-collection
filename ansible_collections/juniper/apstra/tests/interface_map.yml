---
# ── Test playbook for juniper.apstra.interface_map ────────────────
#
# Prerequisites:
#   - Apstra server reachable
#   - Will create/delete its own test blueprint
#
# Usage:
#   ansible-playbook tests/interface_map.yml \
#     -e template_id=L2_Virtual_EVPN

- name: Test interface_map assignments
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    template_id: "{{ template | default('L2_Virtual_EVPN') }}"

  tasks:
    # ── Auth ──────────────────────────────────────────────────────
    - name: Get local hostname
      ansible.builtin.command: hostname
      register: local_hostname
      changed_when: false

    - name: Set blueprint name fact
      ansible.builtin.set_fact:
        blueprint_name: "test_im_{{ local_hostname.stdout }}"

    - name: Connect to Apstra
      juniper.apstra.authenticate:
        logout: false
      register: auth

    # ── Setup: Create blueprint ───────────────────────────────────
    - name: Create test blueprint
      juniper.apstra.blueprint:
        body:
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "{{ template_id }}"
          label: "{{ blueprint_name }}"
        lock_state: "ignore"
        auth_token: "{{ auth.token }}"
      register: bp

    - name: Set blueprint ID fact
      ansible.builtin.set_fact:
        blueprint_id: "{{ bp.id.blueprint }}"

    - name: Show blueprint
      ansible.builtin.debug:
        var: bp

    # ── Discover nodes that need interface maps ───────────────────
    - name: Get blueprint nodes (system nodes via graph query)
      juniper.apstra.blueprint:
        id:
          blueprint: "{{ blueprint_id }}"
        state: queried
        query_type: nodes_by_role
        roles:
          - spine
          - leaf
        auth_token: "{{ auth.token }}"
      register: system_nodes_qe

    - name: Extract leaf and spine IDs
      ansible.builtin.set_fact:
        leaf_ids: >-
          {{ system_nodes_qe.nodes | dict2items
            | selectattr('value.role', 'equalto', 'leaf')
            | map(attribute='value.id') | list }}
        spine_ids: >-
          {{ system_nodes_qe.nodes | dict2items
            | selectattr('value.role', 'equalto', 'spine')
            | map(attribute='value.id') | list }}

    - name: Display node IDs
      ansible.builtin.debug:
        msg: "leaf_ids={{ leaf_ids }}, spine_ids={{ spine_ids }}"

    - name: Skip tests if no switch nodes
      ansible.builtin.meta: end_play
      when: (leaf_ids | length == 0) and (spine_ids | length == 0)

    # ── Discover interface maps from design catalog ───────────────
    - name: Get all design interface maps
      juniper.apstra.design:
        id:
          design_type: interface_map
          name: all
        state: queried
        auth_token: "{{ auth.token }}"
      register: all_imaps

    # Query leaf logical device
    - name: Query leaf logical device
      juniper.apstra.blueprint:
        id:
          blueprint: "{{ blueprint_id }}"
        state: queried
        query: >-
          node('system', id='{{ leaf_ids[0] }}', name='sys')
          .out('logical_device')
          .node('logical_device', name='ld')
        auth_token: "{{ auth.token }}"
      register: leaf_ld_qe

    - name: Extract leaf logical device name
      ansible.builtin.set_fact:
        leaf_ld_id: "{{ leaf_ld_qe.results[0]['ld']['label'] | regex_replace('_v\\d+$', '') }}"

    - name: Find matching leaf interface map
      ansible.builtin.set_fact:
        leaf_imap_id: >-
          {{ (all_imaps.design_items
            | selectattr('logical_device_id', 'equalto', leaf_ld_id)
            | list | first).id }}

    # Query spine logical device
    - name: Query spine logical device
      juniper.apstra.blueprint:
        id:
          blueprint: "{{ blueprint_id }}"
        state: queried
        query: >-
          node('system', id='{{ spine_ids[0] }}', name='sys')
          .out('logical_device')
          .node('logical_device', name='ld')
        auth_token: "{{ auth.token }}"
      register: spine_ld_qe

    - name: Extract spine logical device name
      ansible.builtin.set_fact:
        spine_ld_id: "{{ spine_ld_qe.results[0]['ld']['label'] | regex_replace('_v\\d+$', '') }}"

    - name: Find matching spine interface map
      ansible.builtin.set_fact:
        spine_imap_id: >-
          {{ (all_imaps.design_items
            | selectattr('logical_device_id', 'equalto', spine_ld_id)
            | list | first).id }}

    - name: Display discovered interface maps
      ansible.builtin.debug:
        msg: >-
          leaf_ld={{ leaf_ld_id }}, leaf_imap={{ leaf_imap_id }},
          spine_ld={{ spine_ld_id }}, spine_imap={{ spine_imap_id }}

    # ── Build assignments dict ────────────────────────────────────
    - name: Build interface map assignments for all nodes
      ansible.builtin.set_fact:
        im_assignments: >-
          {{
            dict(
              leaf_ids | zip_longest([], fillvalue=leaf_imap_id) | list
              + spine_ids | zip_longest([], fillvalue=spine_imap_id) | list
            )
          }}

    - name: Display planned assignments
      ansible.builtin.debug:
        var: im_assignments

    # ── Test 1: Assign interface maps ─────────────────────────────
    - name: "Test 1: Assign interface maps to switch nodes"
      juniper.apstra.interface_map:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          assignments: "{{ im_assignments }}"
        auth_token: "{{ auth.token }}"
        state: present
      register: assign_result

    - name: Display assign result
      ansible.builtin.debug:
        var: assign_result

    - name: Verify assignment
      ansible.builtin.assert:
        that:
          - assign_result.changed
        fail_msg: "Interface map assignment failed"
        success_msg: "Test 1 PASSED: Interface maps assigned"

    # ── Test 2: Idempotent assign ─────────────────────────────────
    - name: "Test 2: Assign same interface maps again (idempotent)"
      juniper.apstra.interface_map:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          assignments: "{{ im_assignments }}"
        auth_token: "{{ auth.token }}"
        state: present
      register: idem_result

    - name: Display idempotent result
      ansible.builtin.debug:
        var: idem_result

    - name: Verify idempotency
      ansible.builtin.assert:
        that:
          - not idem_result.changed
        fail_msg: "Interface map assignment was not idempotent"
        success_msg: "Test 2 PASSED: Idempotent (no change)"

    # ── Test 3: Clear assignments ─────────────────────────────────
    - name: Build clear assignments (first leaf only)
      ansible.builtin.set_fact:
        clear_assignment: "{{ {leaf_ids[0]: None} }}"

    - name: "Test 3: Clear interface map for first leaf"
      juniper.apstra.interface_map:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          assignments: "{{ clear_assignment }}"
        auth_token: "{{ auth.token }}"
        state: absent
      register: clear_result

    - name: Display clear result
      ansible.builtin.debug:
        var: clear_result

    - name: Verify clear
      ansible.builtin.assert:
        that:
          - clear_result.changed
        fail_msg: "Interface map clear failed"
        success_msg: "Test 3 PASSED: Interface map cleared"

    # ── Test 4: Clear idempotent ──────────────────────────────────
    - name: "Test 4: Clear same node again (idempotent)"
      juniper.apstra.interface_map:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          assignments: "{{ clear_assignment }}"
        auth_token: "{{ auth.token }}"
        state: absent
      register: clear_idem_result

    - name: Verify clear idempotency
      ansible.builtin.assert:
        that:
          - not clear_idem_result.changed
        fail_msg: "Interface map clear was not idempotent"
        success_msg: "Test 4 PASSED: Clear idempotent"

    # ── Cleanup: Delete blueprint ─────────────────────────────────
    - name: Delete test blueprint
      juniper.apstra.blueprint:
        id:
          blueprint: "{{ blueprint_id }}"
        lock_state: "ignore"
        auth_token: "{{ auth.token }}"
        state: absent
      register: bp_delete

    - name: All interface_map tests passed
      ansible.builtin.debug:
        msg: "All 4 interface_map tests PASSED"
