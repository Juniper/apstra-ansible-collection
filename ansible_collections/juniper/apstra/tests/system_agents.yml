---
# ── Test playbook for juniper.apstra.system_agents ────────────────
#
# Prerequisites:
#   - Apstra server reachable (APSTRA_API_URL or config.yml)
#   - Valid credentials (APSTRA_USERNAME/PASSWORD or config.yml)
#   - A reachable device at the configured management_ip
#
# Usage:
#   ansible-playbook tests/system_agents.yml \
#     -e management_ip=10.0.0.1 \
#     -e device_username=admin \
#     -e device_password=admin@123

- name: Test create/update/delete system_agents
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    test_management_ip: "{{ management_ip | default('10.0.0.99') }}"
    test_device_user: "{{ device_username | default('admin') }}"
    test_device_pass: "{{ device_password | default('admin@123') }}"
    test_label: "test-agent-ansible"
    updated_label: "test-agent-ansible-updated"

  tasks:
    # ── Auth ──────────────────────────────────────────────────────
    - name: Connect to Apstra
      juniper.apstra.authenticate:
        logout: false
      register: auth

    - name: Display auth token
      ansible.builtin.debug:
        msg: "Auth token acquired"

    # ── Cleanup stale agents from prior failed runs ───────────────
    - name: "Cleanup: Remove stale agent by IP (if any)"
      juniper.apstra.system_agents:
        body:
          management_ip: "{{ test_management_ip }}"
        auth_token: "{{ auth.token }}"
        state: absent
      failed_when: false

    # ── Test 1: Create agent ──────────────────────────────────────
    - name: "Test 1: Create system agent"
      juniper.apstra.system_agents:
        body:
          management_ip: "{{ test_management_ip }}"
          agent_type: "offbox"
          label: "{{ test_label }}"
          operation_mode: "full_control"
          platform: "junos"
          device_username: "{{ test_device_user }}"
          device_password: "{{ test_device_pass }}"
        auth_token: "{{ auth.token }}"
        state: present
      register: create_result

    - name: Display create result
      ansible.builtin.debug:
        var: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed
          - create_result.agent_id | length > 0
          - create_result.management_ip == test_management_ip
        fail_msg: "Agent creation failed"
        success_msg: "Test 1 PASSED: Agent created"

    # ── Test 2: Idempotent create ─────────────────────────────────
    - name: "Test 2: Create same agent again (idempotent)"
      juniper.apstra.system_agents:
        body:
          management_ip: "{{ test_management_ip }}"
          agent_type: "offbox"
          label: "{{ test_label }}"
          operation_mode: "full_control"
          platform: "junos"
          device_username: "{{ test_device_user }}"
          device_password: "{{ test_device_pass }}"
        auth_token: "{{ auth.token }}"
        state: present
      register: idem_result

    - name: Display idempotent result
      ansible.builtin.debug:
        var: idem_result

    - name: Verify idempotency
      ansible.builtin.assert:
        that:
          - not idem_result.changed
        fail_msg: "Agent creation was not idempotent"
        success_msg: "Test 2 PASSED: Idempotent (no change)"

    # ── Test 3: Update agent label ────────────────────────────────
    - name: "Test 3: Update agent label"
      juniper.apstra.system_agents:
        id:
          agent_id: "{{ create_result.agent_id }}"
        body:
          label: "{{ updated_label }}"
          device_username: "{{ test_device_user }}"
          device_password: "{{ test_device_pass }}"
        auth_token: "{{ auth.token }}"
        state: present
      register: update_result

    - name: Display update result
      ansible.builtin.debug:
        var: update_result

    - name: Verify update
      ansible.builtin.assert:
        that:
          - update_result.changed
        fail_msg: "Agent update failed"
        success_msg: "Test 3 PASSED: Agent label updated"

    # ── Test 4: Delete agent ──────────────────────────────────────
    - name: "Test 4: Delete system agent"
      juniper.apstra.system_agents:
        id:
          agent_id: "{{ create_result.agent_id }}"
        auth_token: "{{ auth.token }}"
        state: absent
      register: delete_result

    - name: Display delete result
      ansible.builtin.debug:
        var: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
        fail_msg: "Agent deletion failed"
        success_msg: "Test 4 PASSED: Agent deleted"

    # ── Test 5: Delete again (idempotent) ─────────────────────────
    - name: "Test 5: Delete non-existent agent (idempotent)"
      juniper.apstra.system_agents:
        id:
          agent_id: "{{ create_result.agent_id }}"
        auth_token: "{{ auth.token }}"
        state: absent
      register: delete_idem_result

    - name: Verify delete idempotency
      ansible.builtin.assert:
        that:
          - not delete_idem_result.changed
        fail_msg: "Delete was not idempotent"
        success_msg: "Test 5 PASSED: Delete idempotent (already absent)"

    # ── Test 6: Create and delete by management_ip ────────────────
    - name: "Test 6a: Create agent for IP-based delete test"
      juniper.apstra.system_agents:
        body:
          management_ip: "{{ test_management_ip }}"
          agent_type: "offbox"
          label: "{{ test_label }}-ip-delete"
          platform: "junos"
          device_username: "{{ test_device_user }}"
          device_password: "{{ test_device_pass }}"
        auth_token: "{{ auth.token }}"
        state: present
      register: ip_create_result

    - name: "Test 6b: Delete agent by management IP"
      juniper.apstra.system_agents:
        body:
          management_ip: "{{ test_management_ip }}"
        auth_token: "{{ auth.token }}"
        state: absent
      register: ip_delete_result

    - name: Verify IP-based deletion
      ansible.builtin.assert:
        that:
          - ip_delete_result.changed
        fail_msg: "IP-based deletion failed"
        success_msg: "Test 6 PASSED: Agent deleted by management IP"

    # ── Tests 7-10: state=host_key_updated ───────────────────────
    - name: "Test 7 — state=gathered: discover connected agents"
      juniper.apstra.system_agents:
        auth_token: "{{ auth.token }}"
        state: gathered
      register: gathered_result

    - name: "Test 7 — Verify gathered returns agents"
      ansible.builtin.assert:
        that:
          - not gathered_result.failed | default(false)
          - not gathered_result.changed
          - gathered_result.agents is defined
          - gathered_result.agents | length > 0
        fail_msg: "Test 7 FAILED: state=gathered returned no agents"
        success_msg: "Test 7 PASSED: gathered {{ gathered_result.agents | length }} agent(s)"

    - name: "Test 7 — Collect connected agents"
      ansible.builtin.set_fact:
        hk_connected: "{{ gathered_result.agents | selectattr('connection_state', 'eq', 'connected') | list }}"

    - name: "Test 7 — Set target connected agent"
      ansible.builtin.set_fact:
        hk_target: "{{ hk_connected[0] }}"
      when: hk_connected | length > 0

    - name: "Test 8 — host_key_updated force_accept=false on connected agent (no-op)"
      juniper.apstra.system_agents:
        id:
          agent_id: "{{ hk_target.agent_id }}"
        body:
          force_accept: false
        auth_token: "{{ auth.token }}"
        state: host_key_updated
      register: hk_noop
      when: hk_connected | length > 0

    - name: "Test 8 — Verify no-op (connected + force_accept=false)"
      ansible.builtin.assert:
        that:
          - not hk_noop.failed | default(false)
          - not hk_noop.changed
        fail_msg: "Test 8 FAILED: {{ hk_noop.msg | default('no msg') }}"
        success_msg: "Test 8 PASSED: force_accept=false is no-op for connected agent {{ hk_target.agent_id }}"
      when: hk_connected | length > 0

    - name: "Test 9 — host_key_updated check mode (force_accept=true)"
      juniper.apstra.system_agents:
        id:
          agent_id: "{{ hk_target.agent_id }}"
        body:
          force_accept: true
        auth_token: "{{ auth.token }}"
        state: host_key_updated
      check_mode: true
      register: hk_check
      when: hk_connected | length > 0

    - name: "Test 9 — Verify check mode reports would-update"
      ansible.builtin.assert:
        that:
          - not hk_check.failed | default(false)
          - hk_check.changed
          - "'check mode' in hk_check.msg | lower"
        fail_msg: "Test 9 FAILED: {{ hk_check.msg | default('no msg') }}"
        success_msg: "Test 9 PASSED: check mode correctly reports would-update host key"
      when: hk_connected | length > 0

    - name: "Test 10 — host_key_updated check mode by management_ip"
      juniper.apstra.system_agents:
        id:
          management_ip: "{{ hk_target.management_ip }}"
        body:
          force_accept: true
        auth_token: "{{ auth.token }}"
        state: host_key_updated
      check_mode: true
      register: hk_check_ip
      when: hk_connected | length > 0

    - name: "Test 10 — Verify management_ip resolution"
      ansible.builtin.assert:
        that:
          - not hk_check_ip.failed | default(false)
          - hk_check_ip.changed
          - hk_check_ip.agent_id == hk_target.agent_id
        fail_msg: "Test 10 FAILED: {{ hk_check_ip.msg | default('no msg') }}"
        success_msg: "Test 10 PASSED: management_ip {{ hk_target.management_ip }} resolved to agent {{ hk_check_ip.agent_id }}"
      when: hk_connected | length > 0

    - name: "Test 11 — host_key_updated check mode by management_ips list"
      juniper.apstra.system_agents:
        id:
          management_ips: "{{ hk_connected[:2] | map(attribute='management_ip') | list }}"
        body:
          force_accept: true
        auth_token: "{{ auth.token }}"
        state: host_key_updated
      check_mode: true
      register: hk_check_multi
      when: hk_connected | length >= 2

    - name: "Test 11 — Verify multi-IP check mode returns results list"
      ansible.builtin.assert:
        that:
          - not hk_check_multi.failed | default(false)
          - hk_check_multi.changed
          - hk_check_multi.results is defined
          - hk_check_multi.results | length == 2
        fail_msg: "Test 11 FAILED: {{ hk_check_multi.msg | default('no msg') }}"
        success_msg: "Test 11 PASSED: multi-IP check mode returned {{ hk_check_multi.results | length }} results"
      when: hk_connected | length >= 2

    # ── Summary ───────────────────────────────────────────────────
    - name: All system_agents tests passed
      ansible.builtin.debug:
        msg:
          - "Test 1  (create):                    PASSED"
          - "Test 2  (create idempotent):          PASSED"
          - "Test 3  (update label):               PASSED"
          - "Test 4  (delete by id):               PASSED"
          - "Test 5  (delete idempotent):          PASSED"
          - "Test 6  (delete by management_ip):    PASSED"
          - "Test 7  (gathered):                   {{ 'PASSED — ' ~ gathered_result.agents | length ~ ' agent(s)' if not gathered_result.failed | default(false) else 'FAILED' }}"
          - "Test 8  (host_key_updated no-op):     {{ 'PASSED' if hk_connected | length > 0 and not hk_noop.failed | default(false) else 'SKIPPED (no connected agent)' }}"
          - "Test 9  (host_key_updated checkmode): {{ 'PASSED' if hk_connected | length > 0 and not hk_check.failed | default(false) else 'SKIPPED (no connected agent)' }}"
          - "Test 10 (host_key_updated by ip):     {{ 'PASSED' if hk_connected | length > 0 and not hk_check_ip.failed | default(false) else 'SKIPPED (no connected agent)' }}"
          - "Test 11 (host_key_updated multi-ip):  {{ 'PASSED' if hk_connected | length >= 2 and not hk_check_multi.failed | default(false) else 'SKIPPED (need 2+ connected agents)' }}"
