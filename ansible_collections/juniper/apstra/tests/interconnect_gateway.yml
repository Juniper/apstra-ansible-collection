---
# ================================================================
# E2E DCI Test for the interconnect_gateway module
#
# Creates two blueprints from scratch, sets up full DCI between them:
#   VNI pools -> VRFs -> VNs -> Domains -> Gateways -> Routing Policies
#   -> L3 DCI enablement -> VN connection type
#
# Then cleans up everything in reverse order.
#
# Based on: inter-connect-gw/dci_full_setup.yml
# All direct API (uri) calls have been replaced with Ansible modules.
# DCI raw-PATCH helpers live in module_utils/apstra/bp_dci.py.
#
# NOTE: Physical connectivity verification is skipped -- gateways use
#       placeholder IPs so the DCI data plane will not come up.
# ================================================================
- name: "E2E DCI Test: interconnect_gateway module"
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    template_id: "L2_Virtual_EVPN"

    # VNI pool (must already exist on the Apstra instance)
    vni_pool_name: "Default-10000-20000"

    # IP pool for RZ leaf loopback assignment (must already exist)
    loopback_pool_name: "Private-172.16.0.0/12"

    # Routing Zone / VRF (same label both BPs)
    vrf_label: "dci-test-red"

    # Virtual Networks
    bp0_vn_label: "dci-test-vn"
    bp0_vn_subnet: "10.100.0.0/24"
    bp0_vn_gateway: "10.100.0.1"
    bp0_vn_vni: 10100

    bp1_vn_label: "dci-test-vn"
    bp1_vn_subnet: "10.200.0.0/24"
    bp1_vn_gateway: "10.200.0.1"
    bp1_vn_vni: 10200

    # DCI domain
    dci_domain_label: "dci-test-domain"
    dci_route_target: "65500:100"
    bp0_esi_mac: "02:00:00:00:00:01"
    bp1_esi_mac: "02:00:00:00:00:02"

    # L3 DCI
    l3_route_target: "65500:200"
    routing_policy_label: "dci-test-l3-policy"

    # Gateways (placeholder IPs -- no real underlay)
    bp0_gw_name: "ToBP1"
    bp0_gw_ip: "10.20.0.1"
    bp0_gw_asn: 200001

    bp1_gw_name: "ToBP0"
    bp1_gw_ip: "10.10.0.1"
    bp1_gw_asn: 100001

  tasks:

    # ==============================================================
    #  STEP 0: Authenticate + hostname for unique BP names
    # ==============================================================

    - name: Get local hostname
      ansible.builtin.command: hostname
      register: local_hostname
      changed_when: false

    - name: Set blueprint name facts
      ansible.builtin.set_fact:
        bp0_name: "test_dci_bp0_{{ local_hostname.stdout }}"
        bp1_name: "test_dci_bp1_{{ local_hostname.stdout }}"

    - name: Connect to Apstra
      juniper.apstra.authenticate:
        logout: false
      register: auth

    # ==============================================================
    #  STEP 1: Create two blueprints
    # ==============================================================

    - name: Create blueprint BP0
      juniper.apstra.blueprint:
        body:
          label: "{{ bp0_name }}"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "{{ template_id }}"
        lock_state: "ignore"
        auth_token: "{{ auth.token }}"
      register: bp0

    - name: Create blueprint BP1
      juniper.apstra.blueprint:
        body:
          label: "{{ bp1_name }}"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "{{ template_id }}"
        lock_state: "ignore"
        auth_token: "{{ auth.token }}"
      register: bp1

    - name: Verify both blueprints created
      ansible.builtin.assert:
        that:
          - bp0.id.blueprint is defined
          - bp1.id.blueprint is defined
        fail_msg: "Failed to create blueprints"

    - name: Show blueprint IDs
      ansible.builtin.debug:
        msg: "BP0={{ bp0.id.blueprint }} | BP1={{ bp1.id.blueprint }}"

    # ==============================================================
    #  STEP 2: Get leaf node info from both BPs
    # ==============================================================

    - name: "BP0: Get blueprint nodes"
      juniper.apstra.apstra_facts:
        auth_token: "{{ auth.token }}"
        gather_network_facts:
          - "blueprints.nodes"
        id:
          blueprint: "{{ bp0.id.blueprint }}"
      register: bp0_facts

    - name: "BP1: Get blueprint nodes"
      juniper.apstra.apstra_facts:
        auth_token: "{{ auth.token }}"
        gather_network_facts:
          - "blueprints.nodes"
        id:
          blueprint: "{{ bp1.id.blueprint }}"
      register: bp1_facts

    - name: Extract BP0 leaf node IDs and labels
      ansible.builtin.set_fact:
        bp0_leaf_ids: >-
          {{ bp0_facts.ansible_facts.apstra_facts.blueprints[bp0.id.blueprint].nodes
             | dict2items
             | selectattr('value.role', 'equalto', 'leaf')
             | map(attribute='value.id')
             | list }}
        bp0_leaf_labels: >-
          {{ bp0_facts.ansible_facts.apstra_facts.blueprints[bp0.id.blueprint].nodes
             | dict2items
             | selectattr('value.role', 'equalto', 'leaf')
             | map(attribute='value.label')
             | list }}

    - name: Extract BP1 leaf node IDs and labels
      ansible.builtin.set_fact:
        bp1_leaf_ids: >-
          {{ bp1_facts.ansible_facts.apstra_facts.blueprints[bp1.id.blueprint].nodes
             | dict2items
             | selectattr('value.role', 'equalto', 'leaf')
             | map(attribute='value.id')
             | list }}
        bp1_leaf_labels: >-
          {{ bp1_facts.ansible_facts.apstra_facts.blueprints[bp1.id.blueprint].nodes
             | dict2items
             | selectattr('value.role', 'equalto', 'leaf')
             | map(attribute='value.label')
             | list }}

    - name: Show leaf nodes
      ansible.builtin.debug:
        msg: |
          BP0 leaves: {{ bp0_leaf_labels }}
          BP1 leaves: {{ bp1_leaf_labels }}


    # ==============================================================
    #  STEP 3: Assign VNI pools to both BPs
    # ==============================================================

    - name: "BP0: Assign VNI pool (evpn_l3_vnis)"
      juniper.apstra.resource_group:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
          group_type: "vni"
          group_name: "evpn_l3_vnis"
        body:
          pool_ids:
            - "{{ vni_pool_name }}"
        state: present
        auth_token: "{{ auth.token }}"

    - name: "BP0: Assign VNI pool (vxlan_vn_ids)"
      juniper.apstra.resource_group:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
          group_type: "vni"
          group_name: "vxlan_vn_ids"
        body:
          pool_ids:
            - "{{ vni_pool_name }}"
        state: present
        auth_token: "{{ auth.token }}"

    - name: "BP1: Assign VNI pool (evpn_l3_vnis)"
      juniper.apstra.resource_group:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
          group_type: "vni"
          group_name: "evpn_l3_vnis"
        body:
          pool_ids:
            - "{{ vni_pool_name }}"
        state: present
        auth_token: "{{ auth.token }}"

    - name: "BP1: Assign VNI pool (vxlan_vn_ids)"
      juniper.apstra.resource_group:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
          group_type: "vni"
          group_name: "vxlan_vn_ids"
        body:
          pool_ids:
            - "{{ vni_pool_name }}"
        state: present
        auth_token: "{{ auth.token }}"

    # ==============================================================
    #  STEP 4: Create Routing Zones (VRFs) on both BPs
    # ==============================================================

    - name: "BP0: Create routing zone (VRF)"
      juniper.apstra.security_zone:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ vrf_label }}"
          sz_type: "evpn"
          vrf_name: "{{ vrf_label }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_vrf

    - name: "BP1: Create routing zone (VRF)"
      juniper.apstra.security_zone:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
        body:
          label: "{{ vrf_label }}"
          sz_type: "evpn"
          vrf_name: "{{ vrf_label }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp1_vrf

    - name: Verify VRFs created
      ansible.builtin.assert:
        that:
          - bp0_vrf.changed or bp0_vrf.id.security_zone is defined
          - bp1_vrf.changed or bp1_vrf.id.security_zone is defined
        fail_msg: "Failed to create VRFs"

    - name: Show VRF results
      ansible.builtin.debug:
        msg: "BP0 VRF={{ bp0_vrf.id }} | BP1 VRF={{ bp1_vrf.id }}"

    # ==============================================================
    #  STEP 4b: Assign RZ leaf loopback IP pools for the VRFs
    # ==============================================================

    - name: "BP0: Assign RZ leaf loopback IP pool"
      juniper.apstra.resource_group:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
          group_type: "ip"
          group_name: "sz:{{ bp0_vrf.id.security_zone }},leaf_loopback_ips"
        body:
          pool_ids:
            - "{{ loopback_pool_name }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_rz_loopback

    - name: "BP1: Assign RZ leaf loopback IP pool"
      juniper.apstra.resource_group:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
          group_type: "ip"
          group_name: "sz:{{ bp1_vrf.id.security_zone }},leaf_loopback_ips"
        body:
          pool_ids:
            - "{{ loopback_pool_name }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp1_rz_loopback

    - name: Verify RZ loopback IP pools assigned
      ansible.builtin.assert:
        that:
          - bp0_rz_loopback is not failed
          - bp1_rz_loopback is not failed
        fail_msg: "Failed to assign RZ leaf loopback IP pools"

    - name: Show RZ loopback results
      ansible.builtin.debug:
        msg: "BP0 RZ loopback: changed={{ bp0_rz_loopback.changed }} | BP1 RZ loopback: changed={{ bp1_rz_loopback.changed }}"

    # ==============================================================
    #  STEP 5: Create Virtual Networks on both BPs
    # ==============================================================

    - name: "BP0: Create virtual network"
      juniper.apstra.virtual_network:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ bp0_vn_label }}"
          vn_type: "vxlan"
          security_zone_id: "{{ vrf_label }}"
          ipv4_enabled: true
          ipv4_subnet: "{{ bp0_vn_subnet }}"
          virtual_gateway_ipv4_enabled: true
          virtual_gateway_ipv4: "{{ bp0_vn_gateway }}"
          bound_to: >-
            {%- set result = [] -%}
            {%- for lid in bp0_leaf_ids -%}
              {{ result.append({'system_id': lid}) }}
            {%- endfor -%}
            {{ result }}
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_vn

    - name: "BP1: Create virtual network"
      juniper.apstra.virtual_network:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
        body:
          label: "{{ bp1_vn_label }}"
          vn_type: "vxlan"
          security_zone_id: "{{ vrf_label }}"
          ipv4_enabled: true
          ipv4_subnet: "{{ bp1_vn_subnet }}"
          virtual_gateway_ipv4_enabled: true
          virtual_gateway_ipv4: "{{ bp1_vn_gateway }}"
          bound_to: >-
            {%- set result = [] -%}
            {%- for lid in bp1_leaf_ids -%}
              {{ result.append({'system_id': lid}) }}
            {%- endfor -%}
            {{ result }}
        state: present
        auth_token: "{{ auth.token }}"
      register: bp1_vn

    - name: Verify VNs created
      ansible.builtin.assert:
        that:
          - bp0_vn.changed or bp0_vn.id.virtual_network is defined
          - bp1_vn.changed or bp1_vn.id.virtual_network is defined
        fail_msg: "Failed to create virtual networks"

    - name: Show VN results
      ansible.builtin.debug:
        msg: "BP0 VN={{ bp0_vn.id }} | BP1 VN={{ bp1_vn.id }}"

    # ==============================================================
    #  STEP 6: Create Interconnect Domains on both BPs
    # ==============================================================

    - name: "BP0: Create interconnect domain"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          esi_mac: "{{ bp0_esi_mac }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_domain

    - name: "BP1: Create interconnect domain"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp1.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          esi_mac: "{{ bp1_esi_mac }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp1_domain

    - name: Verify domains created
      ansible.builtin.assert:
        that:
          - bp0_domain.changed
          - bp0_domain.id.evpn_interconnect_group is defined
          - bp1_domain.changed
          - bp1_domain.id.evpn_interconnect_group is defined
        fail_msg: "Failed to create interconnect domains"

    # ---- Domain idempotency ----

    - name: "BP0: Create domain again (idempotency)"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          esi_mac: "{{ bp0_esi_mac }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_domain_idem

    - name: Verify domain idempotency
      ansible.builtin.assert:
        that:
          - not bp0_domain_idem.changed
        fail_msg: "Domain create should be idempotent"
        success_msg: "PASSED: Domain create is idempotent"

    # ---- Domain update by label lookup ----

    - name: "BP0: Update domain route_target by label lookup"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "65500:101"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_domain_update

    - name: Verify domain updated
      ansible.builtin.assert:
        that:
          - bp0_domain_update.changed
        fail_msg: "Domain update by label failed"
        success_msg: "PASSED: Domain updated by label lookup"

    - name: "BP0: Restore original route_target"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
        state: present
        auth_token: "{{ auth.token }}"

    - name: Show domain results
      ansible.builtin.debug:
        msg: |
          BP0 domain: {{ bp0_domain.id }}
          BP1 domain: {{ bp1_domain.id }}

    # ==============================================================
    #  STEP 7: Create Remote Gateways on both BPs
    # ==============================================================
    # BP0 gateway points to BP1 leaf (using first leaf node)
    # BP1 gateway points to BP0 leaf (using first leaf node)

    - name: "BP0: Create gateway ToBP1 (using leaf labels + domain label)"
      juniper.apstra.interconnect_gateway:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          gw_name: "{{ bp0_gw_name }}"
          gw_ip: "{{ bp0_gw_ip }}"
          gw_asn: "{{ bp0_gw_asn }}"
          evpn_interconnect_group_id: "{{ dci_domain_label }}"
          local_gw_nodes: "{{ bp0_leaf_labels[:1] }}"
          ttl: 2
          keepalive_timer: 10
          holdtime_timer: 30
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_gateway

    - name: "BP1: Create gateway ToBP0 (using leaf labels + domain label)"
      juniper.apstra.interconnect_gateway:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
        body:
          gw_name: "{{ bp1_gw_name }}"
          gw_ip: "{{ bp1_gw_ip }}"
          gw_asn: "{{ bp1_gw_asn }}"
          evpn_interconnect_group_id: "{{ dci_domain_label }}"
          local_gw_nodes: "{{ bp1_leaf_labels[:1] }}"
          ttl: 2
          keepalive_timer: 10
          holdtime_timer: 30
        state: present
        auth_token: "{{ auth.token }}"
      register: bp1_gateway

    - name: Verify gateways created
      ansible.builtin.assert:
        that:
          - bp0_gateway.changed
          - bp0_gateway.id.remote_gateway is defined
          - bp1_gateway.changed
          - bp1_gateway.id.remote_gateway is defined
        fail_msg: "Failed to create gateways"

    # ---- Gateway idempotency ----

    - name: "BP0: Create gateway again (idempotency)"
      juniper.apstra.interconnect_gateway:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          gw_name: "{{ bp0_gw_name }}"
          gw_ip: "{{ bp0_gw_ip }}"
          gw_asn: "{{ bp0_gw_asn }}"
          evpn_interconnect_group_id: "{{ dci_domain_label }}"
          local_gw_nodes: "{{ bp0_leaf_labels[:1] }}"
          ttl: 2
          keepalive_timer: 10
          holdtime_timer: 30
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_gw_idem

    - name: Verify gateway idempotency
      ansible.builtin.assert:
        that:
          - not bp0_gw_idem.changed
        fail_msg: "Gateway create should be idempotent"
        success_msg: "PASSED: Gateway create is idempotent"

    # ---- Gateway update by name lookup ----

    - name: "BP0: Update gateway IP by gw_name lookup"
      juniper.apstra.interconnect_gateway:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          gw_name: "{{ bp0_gw_name }}"
          gw_ip: "10.20.0.99"
          gw_asn: "{{ bp0_gw_asn }}"
          evpn_interconnect_group_id: "{{ dci_domain_label }}"
          local_gw_nodes: "{{ bp0_leaf_labels[:1] }}"
          ttl: 2
          keepalive_timer: 10
          holdtime_timer: 30
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_gw_update

    - name: Verify gateway updated by name
      ansible.builtin.assert:
        that:
          - bp0_gw_update.changed
        fail_msg: "Gateway update by gw_name failed"
        success_msg: "PASSED: Gateway updated by gw_name lookup"

    - name: "BP0: Restore original gateway IP"
      juniper.apstra.interconnect_gateway:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          gw_name: "{{ bp0_gw_name }}"
          gw_ip: "{{ bp0_gw_ip }}"
          gw_asn: "{{ bp0_gw_asn }}"
          evpn_interconnect_group_id: "{{ dci_domain_label }}"
          local_gw_nodes: "{{ bp0_leaf_labels[:1] }}"
          ttl: 2
          keepalive_timer: 10
          holdtime_timer: 30
        state: present
        auth_token: "{{ auth.token }}"

    - name: Show gateway results
      ansible.builtin.debug:
        msg: |
          BP0 gateway: {{ bp0_gateway.id }}
          BP1 gateway: {{ bp1_gateway.id }}

    # ==============================================================
    #  STEP 8: Create DCI Routing Policies on both BPs
    # ==============================================================

    - name: "BP0: Create DCI routing policy"
      juniper.apstra.routing_policy:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ routing_policy_label }}"
          description: "DCI Layer-3 routing policy for Type 5 exchange"
          policy_type: "user_defined"
          import_policy: "all"
          export_policy:
            loopbacks: true
            l2edge_subnets: true
            spine_leaf_links: false
            spine_superspine_links: false
            static_routes: false
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_rp

    - name: "BP1: Create DCI routing policy"
      juniper.apstra.routing_policy:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
        body:
          label: "{{ routing_policy_label }}"
          description: "DCI Layer-3 routing policy for Type 5 exchange"
          policy_type: "user_defined"
          import_policy: "all"
          export_policy:
            loopbacks: true
            l2edge_subnets: true
            spine_leaf_links: false
            spine_superspine_links: false
            static_routes: false
        state: present
        auth_token: "{{ auth.token }}"
      register: bp1_rp

    - name: Verify routing policies created
      ansible.builtin.assert:
        that:
          - bp0_rp.changed or bp0_rp.id.routing_policy is defined
          - bp1_rp.changed or bp1_rp.id.routing_policy is defined
        fail_msg: "Failed to create routing policies"

    - name: Show routing policy results
      ansible.builtin.debug:
        msg: "BP0 RP={{ bp0_rp.id }} | BP1 RP={{ bp1_rp.id }}"

    # ==============================================================
    #  STEP 9: Enable L3 (Type-5) DCI on both interconnect domains
    # ==============================================================
    # Uses security_zones body field -> resolved to interconnect_security_zones
    # via bp_dci.patch_interconnect_domain_raw (no direct API calls).
    #
    # l3_route_target MUST differ from dci_route_target to avoid
    # EVPN_INTERCONNECT_GROUP_L3_RT_OVERLAP_WITH_L2_RT build error.

    - name: Build BP0 security_zones payload
      ansible.builtin.set_fact:
        bp0_sz_payload: >-
          {{ { vrf_label: { 'routing_policy_id': routing_policy_label, 'interconnect_route_target': l3_route_target, 'enabled_for_l3': true } } }}

    - name: Build BP1 security_zones payload
      ansible.builtin.set_fact:
        bp1_sz_payload: >-
          {{ { vrf_label: { 'routing_policy_id': routing_policy_label, 'interconnect_route_target': l3_route_target, 'enabled_for_l3': true } } }}

    - name: "BP0: Enable L3 DCI on interconnect domain"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          security_zones: "{{ bp0_sz_payload }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_l3

    - name: "BP1: Enable L3 DCI on interconnect domain"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp1.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          security_zones: "{{ bp1_sz_payload }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp1_l3

    - name: Show L3 DCI results
      ansible.builtin.debug:
        msg: |
          BP0 L3 DCI: changed={{ bp0_l3.changed }}
          BP1 L3 DCI: changed={{ bp1_l3.changed }}

    - name: Verify L3 DCI enabled
      ansible.builtin.assert:
        that:
          - bp0_l3.changed
          - bp1_l3.changed
        fail_msg: "Failed to enable L3 DCI"
        success_msg: "PASSED: L3 DCI enabled on both domains"

    # ---- L3 DCI idempotency ----

    - name: "BP0: Enable L3 DCI again (idempotency)"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          security_zones: "{{ bp0_sz_payload }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_l3_idem

    - name: Verify L3 DCI idempotency
      ansible.builtin.assert:
        that:
          - not bp0_l3_idem.changed
        fail_msg: "L3 DCI should be idempotent"
        success_msg: "PASSED: L3 DCI is idempotent"

    # ==============================================================
    #  STEP 9b: Simplified L3 DCI — single task with all options
    # ==============================================================
    # Instead of separate steps for routing policy creation, payload
    # building, and L3 DCI enablement, users can combine everything
    # into a single interconnect_gateway domain task.
    #
    # The security_zones field accepts:
    #   - VRF label or ID as the dict key (auto-resolved)
    #   - routing_policy_id: routing policy label or ID (auto-resolved)
    #   - interconnect_route_target: the L3 route target string
    #   - enabled_for_l3: true to enable Type-5 DCI
    #
    # This is equivalent to Steps 8 + 9 combined: the routing policy
    # must already exist (created in Step 8), but everything else is
    # handled in one task — no separate set_fact needed.

    - name: "BP0: Simplified L3 DCI — single task with routing policy, route target, and Type-5 enable"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          security_zones: >-
            {{ { vrf_label: {
                   'routing_policy_id': routing_policy_label,
                   'interconnect_route_target': l3_route_target,
                   'enabled_for_l3': true
                 }
            } }}
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_l3_simple

    - name: "BP1: Simplified L3 DCI — single task with routing policy, route target, and Type-5 enable"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp1.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          security_zones: >-
            {{ { vrf_label: {
                   'routing_policy_id': routing_policy_label,
                   'interconnect_route_target': l3_route_target,
                   'enabled_for_l3': true
                 }
            } }}
        state: present
        auth_token: "{{ auth.token }}"
      register: bp1_l3_simple

    - name: Show simplified L3 DCI results
      ansible.builtin.debug:
        msg: |
          BP0 L3 DCI (simplified): changed={{ bp0_l3_simple.changed }}
          BP1 L3 DCI (simplified): changed={{ bp1_l3_simple.changed }}

    - name: Verify simplified L3 DCI is idempotent (no change since Step 9 already applied)
      ansible.builtin.assert:
        that:
          - not bp0_l3_simple.changed
          - not bp1_l3_simple.changed
        fail_msg: "Simplified L3 DCI should be idempotent (same config as Step 9)"
        success_msg: "PASSED: Simplified single-task L3 DCI is idempotent"

    # ==============================================================
    #  STEP 10: Set VN connection type (L2+L3) and translation VNI
    # ==============================================================
    # Uses virtual_networks body field -> resolved to
    # interconnect_virtual_networks via bp_dci.patch_interconnect_domain_raw.
    # VN labels are resolved to node IDs automatically.

    - name: Build BP0 virtual_networks payload
      ansible.builtin.set_fact:
        bp0_vn_payload: >-
          {{ { bp0_vn_label: { 'l2': true, 'l3': true, 'translation_vni': bp0_vn_vni | int } } }}

    - name: Build BP1 virtual_networks payload
      ansible.builtin.set_fact:
        bp1_vn_payload: >-
          {{ { bp1_vn_label: { 'l2': true, 'l3': true, 'translation_vni': bp1_vn_vni | int } } }}

    - name: "BP0: Set VN connection type and translation VNI"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          virtual_networks: "{{ bp0_vn_payload }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_vn_dci

    - name: "BP1: Set VN connection type and translation VNI"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp1.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          virtual_networks: "{{ bp1_vn_payload }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp1_vn_dci

    - name: Show VN connection type results
      ansible.builtin.debug:
        msg: |
          BP0 VN DCI: changed={{ bp0_vn_dci.changed }}
          BP1 VN DCI: changed={{ bp1_vn_dci.changed }}

    - name: Verify VN connection type set
      ansible.builtin.assert:
        that:
          - bp0_vn_dci.changed
          - bp1_vn_dci.changed
        fail_msg: "Failed to set VN connection type"
        success_msg: "PASSED: VN connection type set on both domains"

    # ---- VN connection type idempotency ----

    - name: "BP0: Set VN connection type again (idempotency)"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          virtual_networks: "{{ bp0_vn_payload }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_vn_idem

    - name: Verify VN connection type idempotency
      ansible.builtin.assert:
        that:
          - not bp0_vn_idem.changed
        fail_msg: "VN connection type should be idempotent"
        success_msg: "PASSED: VN connection type is idempotent"

    # ==============================================================
    #  STEP 10b: Simplified VN connection type — single task
    # ==============================================================
    # Instead of separate steps for payload building and VN connection
    # type enablement, users can specify virtual_networks directly
    # in the interconnect_gateway domain task.
    #
    # The virtual_networks field accepts:
    #   - VN label or ID as the dict key (auto-resolved)
    #   - l2: true/false to enable Layer-2 (EVPN Type 2)
    #   - l3: true/false to enable Layer-3 (EVPN Type 5)
    #   - translation_vni: integer VNI for translation
    #
    # This eliminates the need for a separate set_fact task.

    - name: "BP0: Simplified VN connection type — single task with L2, L3, and translation VNI"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          virtual_networks: >-
            {{ { bp0_vn_label: {
                   'l2': true,
                   'l3': true,
                   'translation_vni': bp0_vn_vni | int
                 }
            } }}
        state: present
        auth_token: "{{ auth.token }}"
      register: bp0_vn_simple

    - name: "BP1: Simplified VN connection type — single task with L2, L3, and translation VNI"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp1.id.blueprint }}"
        body:
          label: "{{ dci_domain_label }}"
          route_target: "{{ dci_route_target }}"
          virtual_networks: >-
            {{ { bp1_vn_label: {
                   'l2': true,
                   'l3': true,
                   'translation_vni': bp1_vn_vni | int
                 }
            } }}
        state: present
        auth_token: "{{ auth.token }}"
      register: bp1_vn_simple

    - name: Show simplified VN connection type results
      ansible.builtin.debug:
        msg: |
          BP0 VN DCI (simplified): changed={{ bp0_vn_simple.changed }}
          BP1 VN DCI (simplified): changed={{ bp1_vn_simple.changed }}

    - name: Verify simplified VN connection type is idempotent (no change since Step 10 already applied)
      ansible.builtin.assert:
        that:
          - not bp0_vn_simple.changed
          - not bp1_vn_simple.changed
        fail_msg: "Simplified VN connection type should be idempotent (same config as Step 10)"
        success_msg: "PASSED: Simplified single-task VN connection type is idempotent"

    # ==============================================================
    #  DCI Setup Summary
    # ==============================================================

    - name: DCI Setup Summary
      ansible.builtin.debug:
        msg: |
          ============================================
          DCI E2E TEST SETUP COMPLETE
          ============================================
          BP0: {{ bp0_name }} ({{ bp0.id.blueprint }})
          BP1: {{ bp1_name }} ({{ bp1.id.blueprint }})
          VRF: {{ vrf_label }}
          VN BP0: {{ bp0_vn_label }} ({{ bp0_vn_subnet }})
          VN BP1: {{ bp1_vn_label }} ({{ bp1_vn_subnet }})
          Domain: {{ dci_domain_label }} (RT={{ dci_route_target }})
          Gateway BP0->BP1: {{ bp0_gw_name }} ({{ bp0_gw_ip }})
          Gateway BP1->BP0: {{ bp1_gw_name }} ({{ bp1_gw_ip }})
          Routing Policy: {{ routing_policy_label }}
          L3 DCI: enabled (l3_rt={{ l3_route_target }})
          VN connection type: L2+L3
          ============================================
          NOTE: Commit and verification skipped -- no physical underlay.

    # ==============================================================
    #  CLEANUP (reverse order)
    # ==============================================================

    # ---- Delete gateways ----

    - name: "BP0: Delete gateway"
      juniper.apstra.interconnect_gateway:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
          remote_gateway: "{{ bp0_gateway.id.remote_gateway }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp0_gw_del

    - name: "BP1: Delete gateway"
      juniper.apstra.interconnect_gateway:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
          remote_gateway: "{{ bp1_gateway.id.remote_gateway }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp1_gw_del

    - name: Verify gateways deleted
      ansible.builtin.assert:
        that:
          - bp0_gw_del.changed
          - bp1_gw_del.changed
        fail_msg: "Failed to delete gateways"

    # ---- Delete domains ----

    - name: "BP0: Delete interconnect domain"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp0.id.blueprint }}"
          evpn_interconnect_group: "{{ bp0_domain.id.evpn_interconnect_group }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp0_dom_del

    - name: "BP1: Delete interconnect domain"
      juniper.apstra.interconnect_gateway:
        type: domain
        id:
          blueprint: "{{ bp1.id.blueprint }}"
          evpn_interconnect_group: "{{ bp1_domain.id.evpn_interconnect_group }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp1_dom_del

    - name: Verify domains deleted
      ansible.builtin.assert:
        that:
          - bp0_dom_del.changed
          - bp1_dom_del.changed
        fail_msg: "Failed to delete domains"

    # ---- Delete routing policies ----

    - name: "BP0: Delete routing policy"
      juniper.apstra.routing_policy:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
          routing_policy: "{{ bp0_rp.id.routing_policy }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp0_rp_del

    - name: "BP1: Delete routing policy"
      juniper.apstra.routing_policy:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
          routing_policy: "{{ bp1_rp.id.routing_policy }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp1_rp_del

    - name: Verify routing policies deleted
      ansible.builtin.assert:
        that:
          - bp0_rp_del.changed
          - bp1_rp_del.changed
        fail_msg: "Failed to delete routing policies"

    # ---- Delete virtual networks ----

    - name: "BP0: Delete virtual network"
      juniper.apstra.virtual_network:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
          virtual_network: "{{ bp0_vn.id.virtual_network }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp0_vn_del

    - name: "BP1: Delete virtual network"
      juniper.apstra.virtual_network:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
          virtual_network: "{{ bp1_vn.id.virtual_network }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp1_vn_del

    - name: Verify VNs deleted
      ansible.builtin.assert:
        that:
          - bp0_vn_del.changed
          - bp1_vn_del.changed
        fail_msg: "Failed to delete virtual networks"

    # ---- Delete VRFs ----

    - name: "BP0: Delete VRF"
      juniper.apstra.security_zone:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
          security_zone: "{{ bp0_vrf.id.security_zone }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp0_vrf_del

    - name: "BP1: Delete VRF"
      juniper.apstra.security_zone:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
          security_zone: "{{ bp1_vrf.id.security_zone }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp1_vrf_del

    - name: Verify VRFs deleted
      ansible.builtin.assert:
        that:
          - bp0_vrf_del.changed
          - bp1_vrf_del.changed
        fail_msg: "Failed to delete VRFs"

    # ---- Delete blueprints ----

    - name: "BP0: Unlock and delete blueprint"
      juniper.apstra.blueprint:
        id:
          blueprint: "{{ bp0.id.blueprint }}"
        lock_state: "ignore"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp0_del

    - name: "BP1: Unlock and delete blueprint"
      juniper.apstra.blueprint:
        id:
          blueprint: "{{ bp1.id.blueprint }}"
        lock_state: "ignore"
        state: absent
        auth_token: "{{ auth.token }}"
      register: bp1_del

    - name: Verify blueprints deleted
      ansible.builtin.assert:
        that:
          - bp0_del.changed
          - bp1_del.changed
        fail_msg: "Failed to delete blueprints"
        success_msg: "PASSED: All resources cleaned up successfully"
