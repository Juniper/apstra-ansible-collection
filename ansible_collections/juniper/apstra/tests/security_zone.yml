---
- name: Test create/update/delete security_zone
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Get local hostname
      ansible.builtin.command: hostname
      register: local_hostname
      changed_when: false

    - name: Set blueprint name fact
      ansible.builtin.set_fact:
        blueprint_name: "test_sz_{{ local_hostname.stdout }}"

    - name: Connect to Apstra
      juniper.apstra.authenticate:
        logout: false
      register: auth

    - name: Create blueprint
      juniper.apstra.blueprint:
        body:
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2_Virtual_EVPN"
          label: "{{ blueprint_name }}"
        lock_state: "ignore"
        auth_token: "{{ auth.token }}"
      register: bp

    - name: Show created blueprint
      ansible.builtin.debug:
        var: bp

    - name: Create routing_policy
      juniper.apstra.routing_policy:
        id: "{{ bp.id }}"
        body:
          description: "Example routing policy"
          expect_default_ipv4_route: true
          expect_default_ipv6_route: true
          export_policy:
            l2edge_subnets: true
            loopbacks: true
            spine_leaf_links: false
            spine_superspine_links: false
            static_routes: false
          import_policy: "all"
          label: "example_policy"
          policy_type: "user_defined"
        auth_token: "{{ auth.token }}"
      register: rp

    - name: Show created routing policy
      ansible.builtin.debug:
        var: rp

    - name: Create security_zone
      juniper.apstra.security_zone:
        id: "{{ bp.id }}"
        body:
          routing_policy_id: "{{ rp.id.routing_policy }}"
          junos_evpn_irb_mode: "asymmetric"
          l3_mtu: 9170
          vrf_name: "test_vrf"
          vni_id: 16777214
          vrf_description: "my test VRF"
          sz_type: "evpn"
          label: "test-vrf-label"
          vlan_id: 2048
        auth_token: "{{ auth.token }}"
      register: sz

    - name: Show created security_zone
      ansible.builtin.debug:
        var: sz

    - name: Get security_zone by label
      juniper.apstra.security_zone:
        id: "{{ bp.id }}"
        body:
          label: "test-vrf-label"
        auth_token: "{{ auth.token }}"
      register: sz_by_label

    - name: Show retrieved security_zone
      ansible.builtin.debug:
        var: sz_by_label

    - name: Create security_zone (no change)
      juniper.apstra.security_zone:
        id: "{{ bp.id }}"
        body:
          routing_policy_id: "{{ rp.id.routing_policy }}"
          junos_evpn_irb_mode: "asymmetric"
          l3_mtu: 9170
          vrf_name: "test_vrf"
          vni_id: 16777214
          vrf_description: "my test VRF"
          sz_type: "evpn"
          label: "test-vrf-label"
          vlan_id: 2048
        auth_token: "{{ auth.token }}"

    - name: Modify security_zone
      juniper.apstra.security_zone:
        id: "{{ sz.id }}"
        body:
          vrf_description: "Example security zone edwin wuz here"
        auth_token: "{{ auth.token }}"
      register: sz_modify

    - name: Show modified security_zone
      ansible.builtin.debug:
        var: sz_modify

    # ── Tag tests ─────────────────────────────────────────────
    - name: Create tag 'red' in blueprint
      juniper.apstra.tag:
        id: "{{ bp.id }}"
        body:
          label: "red"
          description: "Red tag"
        auth_token: "{{ auth.token }}"

    - name: Create tag 'blue' in blueprint
      juniper.apstra.tag:
        id: "{{ bp.id }}"
        body:
          label: "blue"
          description: "Blue tag"
        auth_token: "{{ auth.token }}"

    - name: Add tags via top-level tags param
      juniper.apstra.security_zone:
        id: "{{ sz.id }}"
        tags:
          - red
        auth_token: "{{ auth.token }}"
      register: sz_tag_toplevel

    - name: Show tagged security_zone (top-level)
      ansible.builtin.debug:
        var: sz_tag_toplevel

    - name: Add tags via body (should be extracted and applied)
      juniper.apstra.security_zone:
        id: "{{ sz.id }}"
        body:
          tags:
            - red
            - blue
        auth_token: "{{ auth.token }}"
      register: sz_tag_body

    - name: Show tagged security_zone (body tags)
      ansible.builtin.debug:
        var: sz_tag_body

    - name: Lookup security_zone by VRF name and add tags
      juniper.apstra.security_zone:
        id:
          blueprint: "{{ blueprint_name }}"
          security_zone: "test_vrf"
        body:
          tags:
            - blue
        auth_token: "{{ auth.token }}"
      register: sz_tag_by_name

    - name: Show tagged security_zone (by VRF name)
      ansible.builtin.debug:
        var: sz_tag_by_name

    - name: Remove one tag (keep only red)
      juniper.apstra.security_zone:
        id: "{{ sz.id }}"
        tags:
          - red
        auth_token: "{{ auth.token }}"
      register: sz_tag_remove_one

    - name: Show security_zone after removing one tag
      ansible.builtin.debug:
        var: sz_tag_remove_one

    - name: Verify only red tag remains
      ansible.builtin.assert:
        that:
          - sz_tag_remove_one.tag_response == ["red"]

    - name: Remove all tags
      juniper.apstra.security_zone:
        id: "{{ sz.id }}"
        tags: []
        auth_token: "{{ auth.token }}"
      register: sz_tag_remove_all

    - name: Show security_zone after removing all tags
      ansible.builtin.debug:
        var: sz_tag_remove_all

    - name: Verify all tags removed
      ansible.builtin.assert:
        that:
          - sz_tag_remove_all.tag_response == []
    # ── End tag tests ─────────────────────────────────────────

    - name: Delete the security_zone
      juniper.apstra.security_zone:
        id: "{{ sz.id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: sz_delete

    - name: Show deleted security_zone
      ansible.builtin.debug:
        var: sz_delete

    - name: Unlock the blueprint
      juniper.apstra.blueprint:
        id: "{{ bp.id }}"
        lock_state: "unlocked"
        auth_token: "{{ auth.token }}"
      register: blueprint_unlock

    - name: Show unlocked blueprint
      ansible.builtin.debug:
        var: blueprint_unlock

    - name: Delete blueprint
      juniper.apstra.blueprint:
        id: "{{ bp.id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: blueprint_delete

    - name: Show deleted blueprint
      ansible.builtin.debug:
        var: blueprint_delete

    - name: Logout of Apstra
      juniper.apstra.authenticate:
        logout: true
        auth_token: "{{ auth.token }}"
