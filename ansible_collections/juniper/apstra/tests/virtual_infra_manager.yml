---
# ── Test playbook for juniper.apstra.virtual_infra_manager ───────────────────
#
# Prerequisites:
#   - Apstra server reachable
#   - Will create/delete its own test global VIM and blueprint
#
# Usage:
#   ansible-playbook tests/virtual_infra_manager.yml

- name: Test virtual_infra_manager module
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    # ── Auth ──────────────────────────────────────────────────────
    - name: Connect to Apstra
      juniper.apstra.authenticate:
        logout: false
      register: auth

    - name: Get local hostname for unique naming
      ansible.builtin.command: hostname
      register: local_hostname
      changed_when: false

    - name: Set unique test names
      ansible.builtin.set_fact:
        vim_display_name: "test_vim_{{ local_hostname.stdout }}"
        blueprint_name: "test_vim_bp_{{ local_hostname.stdout }}"

    # ── Tests ─────────────────────────────────────────────────────
    - name: Run virtual_infra_manager tests
      block:
        # ── Test 1: Global create ──────────────────────────────────
        # Creates a vCenter-type VIM with dummy credentials.
        # Apstra validates the schema at creation time but does NOT
        # attempt a live connection, so this succeeds with fake creds.
        - name: "Test 1: Create global VIM (state=present)"
          juniper.apstra.virtual_infra_manager:
            body:
              display_name: "{{ vim_display_name }}"
              type: "vcenter"
              hostname: "192.0.2.1"
              username: "testuser"
              password: "TestPass123!"
            state: present
            auth_token: "{{ auth.token }}"
          register: vim_created

        - name: Display created VIM
          ansible.builtin.debug:
            var: vim_created

        - name: Verify VIM was created
          ansible.builtin.assert:
            that:
              - vim_created.changed
              - vim_created.id is defined
              - vim_created.id.virtual_infra_manager is defined
              - vim_created.msg is search("created")
            fail_msg: "Test 1 FAILED: global VIM was not created"
            success_msg: >-
              Test 1 PASSED: global VIM created with ID
              {{ vim_created.id.virtual_infra_manager }}

        - name: Set VIM ID fact for subsequent tests
          ansible.builtin.set_fact:
            vim_id: "{{ vim_created.id.virtual_infra_manager }}"

        # ── Test 2: Global get / idempotent present ────────────────
        - name: "Test 2: Present with same body (idempotent — no changes)"
          juniper.apstra.virtual_infra_manager:
            id:
              virtual_infra_manager: "{{ vim_id }}"
            body:
              hostname: "192.0.2.1"
            state: present
            auth_token: "{{ auth.token }}"
          register: vim_idem

        - name: Verify idempotent result
          ansible.builtin.assert:
            that:
              - not vim_idem.changed
              - vim_idem.msg is search("no changes")
            fail_msg: "Test 2 FAILED: expected no changes on idempotent present"
            success_msg: "Test 2 PASSED: idempotent present returned no changes"

        # ── Test 3: Global update by UUID ────────────────────────
        - name: "Test 3: Update VIM hostname by UUID (state=present)"
          juniper.apstra.virtual_infra_manager:
            id:
              virtual_infra_manager: "{{ vim_id }}"
            body:
              hostname: "192.0.2.2"
            state: present
            auth_token: "{{ auth.token }}"
          register: vim_updated

        - name: Verify update
          ansible.builtin.assert:
            that:
              - vim_updated.changed
              - vim_updated.msg is search("updated")
            fail_msg: "Test 3 FAILED: VIM update failed"
            success_msg: "Test 3 PASSED: VIM hostname updated successfully"

        # ── Test 4: Name-to-id: update by display_name ───────────
        - name: "Test 4: Update VIM by display_name (name-to-id resolution)"
          juniper.apstra.virtual_infra_manager:
            id:
              virtual_infra_manager: "{{ vim_display_name }}"  # human name
            body:
              hostname: "192.0.2.3"
            state: present
            auth_token: "{{ auth.token }}"
          register: vim_by_name

        - name: Verify name-to-id update result
          ansible.builtin.assert:
            that:
              - vim_by_name.changed
              - vim_by_name.id.virtual_infra_manager == vim_id
            fail_msg: "Test 4 FAILED: name-to-id resolution or update failed"
            success_msg: >-
              Test 4 PASSED: display_name '{{ vim_display_name }}' resolved
              to ID {{ vim_id }} and update succeeded

        # ── Test 5: Blueprint scope — list (empty) ────────────────
        # Create a fresh blueprint then list its virtual_infra nodes.
        # A new blueprint will always have an empty VIM list.
        # Blueprint-level VIM assignment (state=present with infra_type +
        # system_id) requires a real Apstra system_id in the blueprint —
        # not possible in a simulated test without physically connected
        # devices; that path is covered by integration tests.
        - name: Create test blueprint for blueprint-scope test
          juniper.apstra.blueprint:
            body:
              design: "two_stage_l3clos"
              init_type: "template_reference"
              template_id: "L2_Virtual_EVPN"
              label: "{{ blueprint_name }}"
            lock_state: "ignore"
            auth_token: "{{ auth.token }}"
          register: bp

        - name: Set blueprint ID fact
          ansible.builtin.set_fact:
            blueprint_id: "{{ bp.id.blueprint }}"

        - name: "Test 5: Blueprint scope — VIM assignment skipped (no system_id)"
          ansible.builtin.debug:
            msg: >-
              Test 5 NOTE: blueprint-level VIM assignment (POST
              /blueprints/{id}/virtual_infra) requires a real Apstra
              system_id from a physically managed device.  The endpoint
              is wired (virtualInfraClient) and the module routes
              correctly to _handle_blueprint_vim when 'blueprint' is
              present in id. Full coverage is available via integration
              tests against a live blueprint with managed systems.

        # ── Test 6: Global delete by UUID ────────────────────────
        - name: "Test 6: Delete global VIM by UUID (state=absent)"
          juniper.apstra.virtual_infra_manager:
            id:
              virtual_infra_manager: "{{ vim_id }}"
            state: absent
            auth_token: "{{ auth.token }}"
          register: vim_deleted

        - name: Verify deletion
          ansible.builtin.assert:
            that:
              - vim_deleted.changed
              - vim_deleted.msg is search("deleted")
            fail_msg: "Test 6 FAILED: VIM was not deleted"
            success_msg: "Test 6 PASSED: global VIM deleted successfully"

      # ── Cleanup ───────────────────────────────────────────────
      always:
        - name: Delete test VIM if it still exists
          juniper.apstra.virtual_infra_manager:
            id:
              virtual_infra_manager: "{{ vim_id }}"
            state: absent
            auth_token: "{{ auth.token }}"
          when: vim_id is defined
          ignore_errors: true

        - name: Delete test blueprint if it was created
          juniper.apstra.blueprint:
            id:
              blueprint: "{{ blueprint_id }}"
            lock_state: "ignore"
            auth_token: "{{ auth.token }}"
            state: absent
          when: blueprint_id is defined
          ignore_errors: true

    # ── Summary ───────────────────────────────────────────────────
    - name: All virtual_infra_manager tests passed
      ansible.builtin.debug:
        msg: "All virtual_infra_manager tests PASSED"
