---
- name: Test create/delete blueprint
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Get local hostname
      ansible.builtin.command: hostname
      register: local_hostname
      changed_when: false

    - name: Set blueprint name fact
      ansible.builtin.set_fact:
        blueprint_name: "test_blueprint_{{ local_hostname.stdout }}"

    - name: Connect to Apstra
      juniper.apstra.authenticate:
        logout: false
      register: auth

    - name: Create blueprint
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}"
          design: "freeform"
        lock_state: "locked"
        auth_token: "{{ auth.token }}"
      register: blueprint_create

    - name: Show created blueprint
      ansible.builtin.debug:
        var: blueprint_create

    - name: Create blueprint -- no change
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}"
          design: "freeform"
        lock_state: "ignore"
        auth_token: "{{ auth.token }}"

    - name: Commit the blueprint
      juniper.apstra.blueprint:
        id: "{{ blueprint_create.id }}"
        lock_state: "ignore"
        state: committed
        auth_token: "{{ auth.token }}"
      register: blueprint_commit

    - name: Show committed blueprint
      ansible.builtin.debug:
        var: blueprint_commit

    - name: Unlock blueprint
      juniper.apstra.blueprint:
        id: "{{ blueprint_create.id }}"
        lock_state: "unlocked"
        auth_token: "{{ auth.token }}"
      register: blueprint_unlock

    - name: Show unlocked blueprint
      ansible.builtin.debug:
        var: blueprint_unlock

    - name: Delete blueprint
      juniper.apstra.blueprint:
        id: "{{ blueprint_create.id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: blueprint_delete

    - name: Show deleted blueprint
      ansible.builtin.debug:
        var: blueprint_delete

    # ── Template name resolution tests ────────────────────────────

    - name: Create blueprint using template display_name
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}_template_name"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2 Virtual EVPN"
        auth_token: "{{ auth.token }}"
      register: bp_template_name

    - name: Show template-name blueprint
      ansible.builtin.debug:
        var: bp_template_name

    - name: Verify template name resolution
      ansible.builtin.assert:
        that:
          - bp_template_name.changed
          - bp_template_name.id.blueprint | length > 0
        fail_msg: "Blueprint creation with template display_name failed"
        success_msg: "PASSED: Blueprint created using template display name"

    - name: Delete template-name blueprint
      juniper.apstra.blueprint:
        id: "{{ bp_template_name.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    - name: Create blueprint using template ID directly
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}_template_id"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2_Virtual_EVPN"
        auth_token: "{{ auth.token }}"
      register: bp_template_id

    - name: Verify template ID pass-through
      ansible.builtin.assert:
        that:
          - bp_template_id.changed
          - bp_template_id.id.blueprint | length > 0
        fail_msg: "Blueprint creation with template ID failed"
        success_msg: "PASSED: Blueprint created using exact template ID"

    - name: Delete template-id blueprint
      juniper.apstra.blueprint:
        id: "{{ bp_template_id.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    - name: Verify invalid template name fails gracefully
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}_bad_template"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "NonExistentTemplate_12345"
        auth_token: "{{ auth.token }}"
      register: bp_bad_template
      ignore_errors: true

    - name: Verify bad template produced error
      ansible.builtin.assert:
        that:
          - bp_bad_template is failed
          - "'not found' in bp_bad_template.msg"
        fail_msg: "Invalid template should have failed with 'not found'"
        success_msg: "PASSED: Invalid template name correctly rejected"

    # ── node_updated: assignment (bulk label-based) tests ──────────────────

    - name: Create L2-EVPN blueprint for node_updated tests
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}_node_assign"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2_Virtual_EVPN"
        lock_state: ignore
        auth_token: "{{ auth.token }}"
      register: bp_assign

    - name: Query spine nodes by role
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        query_type: nodes_by_role
        roles:
          - spine
        auth_token: "{{ auth.token }}"
        state: queried
      register: spine_nodes

    - name: Show spine node labels
      ansible.builtin.debug:
        msg: "Spine labels: {{ spine_nodes.nodes.keys() | list }}"

    - name: Build assignment dict (spine label → fake serial)
      ansible.builtin.set_fact:
        spine_assignment: >-
          {{
            spine_assignment | default({}) | combine({
              item.key: 'FAKE_SERIAL_' ~ loop_idx
            })
          }}
      loop: "{{ spine_nodes.nodes | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
        index_var: loop_idx

    - name: "Build reset assignment dict (set all spines to unique RESET_SERIAL_N)"
      ansible.builtin.set_fact:
        reset_assignment: "{{ reset_assignment | default({}) | combine({item: 'RESET_SERIAL_' ~ reset_idx}) }}"
      loop: "{{ spine_nodes.nodes.keys() | list }}"
      loop_control:
        index_var: reset_idx

    - name: "Pre-reset spine serials so assignment test always triggers a change"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        assignment: "{{ reset_assignment }}"
        state: node_updated
        auth_token: "{{ auth.token }}"

    - name: "Test assignment — bulk assign serials to all spine nodes"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        assignment: "{{ spine_assignment }}"
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: assign_result

    - name: Verify assignment changed and nodes_updated contains all spines
      ansible.builtin.assert:
        that:
          - assign_result.changed
          - assign_result.nodes_updated.keys() | list | sort == spine_assignment.keys() | list | sort
          - assign_result.nodes_unchanged | length == 0
        fail_msg: "Bulk assignment failed: {{ assign_result }}"
        success_msg: "PASSED: Bulk assignment set serials on {{ assign_result.nodes_updated | length }} spine(s)"

    - name: "Test assignment — idempotent re-run (no change)"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        assignment: "{{ spine_assignment }}"
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: assign_idem

    - name: Verify idempotency (no change on second run)
      ansible.builtin.assert:
        that:
          - not assign_idem.changed
          - assign_idem.nodes_unchanged | length == spine_assignment | length
          - assign_idem.nodes_updated | length == 0
        fail_msg: "Assignment should be idempotent: {{ assign_idem }}"
        success_msg: "PASSED: Re-run correctly reported no changes"

    - name: "Test assignment — invalid label fails with clear error"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        assignment:
          nonexistent_node_xyz: "FAKE_SERIAL_999"
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: assign_bad_label
      ignore_errors: true

    - name: Verify invalid label produces informative error
      ansible.builtin.assert:
        that:
          - assign_bad_label is failed
          - "'nonexistent_node_xyz' in assign_bad_label.msg"
        fail_msg: "Invalid label should fail with label name in error"
        success_msg: "PASSED: Invalid node label correctly rejected"

    - name: "Test node_id single-node path still works (regression)"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        node_id: "{{ spine_nodes.nodes[spine_nodes.nodes.keys() | first].id }}"
        system_id: "SINGLE_NODE_SERIAL"
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: single_node_result

    - name: Verify single-node path works
      ansible.builtin.assert:
        that:
          - single_node_result.changed
          - single_node_result.node is defined
        fail_msg: "Single-node node_id path broken: {{ single_node_result }}"
        success_msg: "PASSED: Single-node path (node_id) still works"

    # ── node_updated: rack rename tests ────────────────────────────

    - name: "Query all rack nodes in blueprint"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        query: "node('rack', name='rack')"
        state: queried
        auth_token: "{{ auth.token }}"
      register: rack_query

    - name: Show rack labels
      ansible.builtin.debug:
        msg: "Racks: {{ rack_query.results | map(attribute='rack') | map(attribute='label') | list }}"

    - name: Set first rack facts for rename tests
      ansible.builtin.set_fact:
        rack_original_label: "{{ rack_query.results[0].rack.label }}"
        rack_node_id: "{{ rack_query.results[0].rack.id }}"
        rack_new_label: "renamed-rack-1"

    - name: "Pre-test: reset rack to baseline so rename tests are always idempotent-safe"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        rack_id: "{{ rack_node_id }}"
        rack_label: "rack-test-baseline"
        node_type: rack
        state: node_updated
        auth_token: "{{ auth.token }}"

    - name: "Set rack_original_label to pre-test baseline"
      ansible.builtin.set_fact:
        rack_original_label: "rack-test-baseline"

    - name: "TEST RACK-1 — Rename rack by current_label with node_type=rack"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        current_label: "{{ rack_original_label }}"
        rack_label: "{{ rack_new_label }}"
        node_type: rack
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: rack_rename

    - name: Verify rack was renamed
      ansible.builtin.assert:
        that:
          - rack_rename.changed
          - rack_rename.node.label == rack_new_label
        fail_msg: "Rack rename failed: {{ rack_rename }}"
        success_msg: "PASSED: Rack renamed from '{{ rack_original_label }}' to '{{ rack_new_label }}'"

    - name: "TEST RACK-2 — Idempotent rack rename (no change)"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        current_label: "{{ rack_new_label }}"
        rack_label: "{{ rack_new_label }}"
        node_type: rack
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: rack_rename_idem

    - name: Verify idempotency
      ansible.builtin.assert:
        that:
          - not rack_rename_idem.changed
        fail_msg: "Rack rename should be idempotent: {{ rack_rename_idem }}"
        success_msg: "PASSED: Rack rename idempotent — no change on re-run"

    - name: "TEST RACK-3 — Rename rack by rack_id (UUID)"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        rack_id: "{{ rack_node_id }}"
        rack_label: "rack-by-uuid"
        node_type: rack
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: rack_rename_by_id

    - name: Verify rename by rack_id
      ansible.builtin.assert:
        that:
          - rack_rename_by_id.changed
          - rack_rename_by_id.node.label == "rack-by-uuid"
        fail_msg: "Rack rename by rack_id failed: {{ rack_rename_by_id }}"
        success_msg: "PASSED: Rack renamed via rack_id to 'rack-by-uuid'"

    - name: "TEST RACK-4 — Rename rack back to original name"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        rack_id: "{{ rack_node_id }}"
        rack_label: "{{ rack_original_label }}"
        node_type: rack
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: rack_restore

    - name: Verify restore
      ansible.builtin.assert:
        that:
          - rack_restore.changed
          - rack_restore.node.label == rack_original_label
        fail_msg: "Rack restore failed: {{ rack_restore }}"
        success_msg: "PASSED: Rack restored to original label '{{ rack_original_label }}'"

    - name: "TEST RACK-5 — Non-existent rack label with node_type fails"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        current_label: "nonexistent_rack_xyz"
        rack_label: "should-fail"
        node_type: rack
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: rack_bad_label
      ignore_errors: true

    - name: Verify non-existent rack label produces clear error
      ansible.builtin.assert:
        that:
          - rack_bad_label is failed
          - "'nonexistent_rack_xyz' in rack_bad_label.msg"
          - "'rack' in rack_bad_label.msg"
        fail_msg: "Non-existent rack should fail with label in msg"
        success_msg: "PASSED: Non-existent rack label correctly rejected"

    - name: Delete node_updated test blueprint
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    # ─────────────────────────────────────────────────────────────────────
    #  Rack management tests (state=rack_added, state=rack_deleted)
    # ─────────────────────────────────────────────────────────────────────

    - name: "[RACK SETUP] Find leftover rack test blueprint from prior runs"
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}_rack_test"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2 Virtual EVPN"
        lock_state: ignore
        state: present
        auth_token: "{{ auth.token }}"
      register: bp_rack_stale
      ignore_errors: true

    - name: "[RACK SETUP] Delete leftover rack test blueprint if found"
      juniper.apstra.blueprint:
        id: "{{ bp_rack_stale.id }}"
        lock_state: ignore
        state: absent
        auth_token: "{{ auth.token }}"
      when:
        - bp_rack_stale is success
        - bp_rack_stale.id is defined
        - bp_rack_stale.id.blueprint is defined
        - bp_rack_stale.id.blueprint | length > 0
      ignore_errors: true

    - name: "[RACK SETUP] Create L2-EVPN blueprint for rack management tests"
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}_rack_test"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2 Virtual EVPN"
        lock_state: locked
        auth_token: "{{ auth.token }}"
      register: bp_rack

    - name: "[RACK SETUP] Save rack test blueprint ID"
      ansible.builtin.set_fact:
        rack_bp_id: "{{ bp_rack.id.blueprint }}"

    - name: "[RACK SETUP] Query initial racks in blueprint"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        query_type: "nodes_by_type"
        state: queried
        auth_token: "{{ auth.token }}"
      ignore_errors: true
      register: rack_initial_query

    - name: "[RACK SETUP] Get available rack types from design"
      juniper.apstra.authenticate:
        logout: false
      register: auth_check

    # Use the raw QE approach to discover rack types already in the blueprint
    - name: "[RACK SETUP] Query racks via QE to discover rack_type_id"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        query: "node('rack', name='rack')"
        state: queried
        auth_token: "{{ auth.token }}"
      register: rack_qe_result

    - name: "[RACK SETUP] Save first existing rack info for later tests"
      ansible.builtin.set_fact:
        existing_rack: "{{ rack_qe_result.results[0].rack }}"
        existing_rack_type_ref: "{{ (rack_qe_result.results[0].rack.rack_type_json | from_json).display_name | default('') }}"
        existing_rack_node_id: "{{ rack_qe_result.results[0].rack.id }}"
        initial_rack_count: "{{ rack_qe_result.results | length }}"
      when:
        - rack_qe_result is success
        - rack_qe_result.results | length > 0

    - name: "[RACK SETUP] Show discovered rack type display_name"
      ansible.builtin.debug:
        msg: "Discovered rack_type_ref='{{ existing_rack_type_ref }}', rack_node_id={{ existing_rack_node_id }}, initial_rack_count={{ initial_rack_count }}"
      when: existing_rack_type_ref is defined


    # ── TEST RACK_ADD-DELTA-1 (WebUI-style, non-idempotent) ─────────────
    - name: "[TEST RACK_ADD-DELTA-1] Capture rack IDs before racks_to_add"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        query: "node('rack', name='rack')"
        state: queried
        auth_token: "{{ auth.token }}"
      register: rack_qe_before_delta_add

    - name: "[TEST RACK_ADD-DELTA-1] Add 1 rack using racks_to_add"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        rack_type: "{{ existing_rack_type_ref }}"
        racks_to_add: 1
        state: rack_added
        auth_token: "{{ auth.token }}"
      register: rack_add_delta1
      when: existing_rack_type_ref is defined and existing_rack_type_ref | length > 0

    - name: "[TEST RACK_ADD-DELTA-1] Verify 1 rack was added and changed=true"
      ansible.builtin.assert:
        that:
          - rack_add_delta1 is defined
          - rack_add_delta1 is success
          - rack_add_delta1.changed
          - rack_add_delta1.racks_added == 1
        fail_msg: "FAILED: racks_to_add did not add 1 rack (changed={{ rack_add_delta1.changed }}, racks_added={{ rack_add_delta1.racks_added }})"
        success_msg: "PASSED: racks_to_add added 1 rack (changed=true)"
      when: rack_add_delta1 is defined

    - name: "[TEST RACK_ADD-DELTA-1] Capture rack IDs after racks_to_add"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        query: "node('rack', name='rack')"
        state: queried
        auth_token: "{{ auth.token }}"
      register: rack_qe_after_delta_add

    - name: "[TEST RACK_ADD-DELTA-1] Identify newly added rack candidate IDs"
      ansible.builtin.set_fact:
        rack_added_by_delta_candidates: "{{ (rack_qe_after_delta_add.results | map(attribute='rack') | map(attribute='id') | list) | difference(rack_qe_before_delta_add.results | map(attribute='rack') | map(attribute='id') | list) }}"

    - name: "[TEST RACK_ADD-DELTA-1] Verify exactly one new rack ID was discovered"
      ansible.builtin.assert:
        that:
          - rack_added_by_delta_candidates | length == 1
        fail_msg: "FAILED: Expected exactly 1 new rack after racks_to_add, got {{ rack_added_by_delta_candidates | length }}"
        success_msg: "PASSED: Identified exactly one newly added rack candidate"

    - name: "[TEST RACK_ADD-DELTA-1] Save newly added rack ID"
      ansible.builtin.set_fact:
        rack_added_by_delta: "{{ rack_added_by_delta_candidates[0] }}"

    - name: "[TEST RACK_ADD-DELTA-1] Delete the newly added rack"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        rack_id: "{{ rack_added_by_delta }}"
        state: rack_deleted
        auth_token: "{{ auth.token }}"
      register: rack_del_delta1

    - name: "[TEST RACK_ADD-DELTA-1] Verify the newly added rack was deleted"
      ansible.builtin.assert:
        that:
          - rack_del_delta1 is defined
          - rack_del_delta1 is success
          - rack_del_delta1.changed
          - rack_del_delta1.racks_deleted | length == 1
          - rack_added_by_delta in rack_del_delta1.racks_deleted
        fail_msg: "FAILED: Could not delete the rack added by racks_to_add"
        success_msg: "PASSED: Deleted rack added by racks_to_add and continued"

    # ── TEST RACK_ADD-1 ───────────────────────────────────────────────────
    - name: "[TEST RACK_ADD-1] Ensure blueprint has (initial+1) racks — rack_count is desired total, not delta (idempotent)"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        rack_type: "{{ existing_rack_type_ref }}"
        rack_count: "{{ initial_rack_count | int + 1 }}"
        state: rack_added
        auth_token: "{{ auth.token }}"
      register: rack_add1
      when: existing_rack_type_ref is defined and existing_rack_type_ref | length > 0

    - name: "[TEST RACK_ADD-1] Verify racks were added and changed=true"
      ansible.builtin.assert:
        that:
          - rack_add1 is defined
          - rack_add1 is success
          - rack_add1.changed
          - rack_add1.racks_added == 1
        fail_msg: "FAILED: rack_added did not add racks (changed={{ rack_add1.changed }}, racks_added={{ rack_add1.racks_added }})"
        success_msg: "PASSED: rack_added succeeded, racks_added={{ rack_add1.racks_added }}, total={{ rack_add1.racks | length }}, changed={{ rack_add1.changed }}"
      when: rack_add1 is defined

    # ── TEST RACK_ADD-2 (idempotency) ────────────────────────────────────
    - name: "[TEST RACK_ADD-2] Re-run with same desired total — no change (idempotency)"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        rack_type: "{{ existing_rack_type_ref }}"
        rack_count: "{{ initial_rack_count | int + 1 }}"
        state: rack_added
        auth_token: "{{ auth.token }}"
      register: rack_add2
      when: existing_rack_type_ref is defined and existing_rack_type_ref | length > 0

    - name: "[TEST RACK_ADD-2] Verify idempotency"
      ansible.builtin.assert:
        that:
          - rack_add2 is defined
          - rack_add2 is success
          - not rack_add2.changed
        fail_msg: "FAILED: rack_added is not idempotent (changed=true on second run)"
        success_msg: "PASSED: rack_added is idempotent (changed=false)"
      when: rack_add2 is defined

    # ── TEST RACK_ADD-3 (lower count — still idempotent) ─────────────────
    - name: "[TEST RACK_ADD-3] Desired total below current count — no change (already satisfied)"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        rack_type: "{{ existing_rack_type_ref }}"
        rack_count: 1
        state: rack_added
        auth_token: "{{ auth.token }}"
      register: rack_add3
      when: existing_rack_type_ref is defined and existing_rack_type_ref | length > 0

    - name: "[TEST RACK_ADD-3] Verify no change when below current count"
      ansible.builtin.assert:
        that:
          - rack_add3 is defined
          - rack_add3 is success
          - not rack_add3.changed
        fail_msg: "FAILED: rack_added should not change when count <= existing"
        success_msg: "PASSED: rack_added with lower count is idempotent"
      when: rack_add3 is defined

    # ── TEST RACK_TYPE-1 (invalid type → fail with helpful message) ───────
    - name: "[TEST RACK_TYPE-1] rack_added with non-existent type name"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        rack_type: "nonexistent-rack-type-xyz"
        rack_count: 1
        state: rack_added
        auth_token: "{{ auth.token }}"
      register: rack_bad_type
      ignore_errors: true

    - name: "[TEST RACK_TYPE-1] Verify failure with helpful error"
      ansible.builtin.assert:
        that:
          - rack_bad_type is failed
          - "'nonexistent-rack-type-xyz' in rack_bad_type.msg"
        fail_msg: "FAILED: Invalid rack type should fail with name in msg"
        success_msg: "PASSED: Invalid rack type correctly rejected"

    # ── TEST RACK_DEL-1 — delete a rack by its graph node ID ─────────────
    - name: "[TEST RACK_DEL-1] Refresh rack list to pick a node ID to delete"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        query: "node('rack', name='rack')"
        state: queried
        auth_token: "{{ auth.token }}"
      register: rack_qe_before_del

    - name: "[TEST RACK_DEL-1] Save the last rack's node_id for deletion"
      ansible.builtin.set_fact:
        rack_to_delete: "{{ rack_qe_before_del.results[-1].rack.id }}"
      when:
        - rack_qe_before_del is success
        - rack_qe_before_del.results | length > 0

    - name: "[TEST RACK_DEL-1] Delete the rack by node ID"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        rack_id: "{{ rack_to_delete }}"
        state: rack_deleted
        auth_token: "{{ auth.token }}"
      register: rack_del1
      when: rack_to_delete is defined

    - name: "[TEST RACK_DEL-1] Verify rack was deleted"
      ansible.builtin.assert:
        that:
          - rack_del1 is defined
          - rack_del1 is success
          - rack_del1.changed
          - rack_del1.racks_deleted | length == 1
          - rack_to_delete in rack_del1.racks_deleted
        fail_msg: "FAILED: rack_deleted did not report the deleted rack"
        success_msg: "PASSED: rack_deleted succeeded, deleted={{ rack_del1.racks_deleted }}"
      when: rack_del1 is defined

    # ── TEST RACK_DEL-2 (idempotency — same ID, already gone) ────────────
    - name: "[TEST RACK_DEL-2] Delete same rack again (idempotency)"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        rack_id: "{{ rack_to_delete }}"
        state: rack_deleted
        auth_token: "{{ auth.token }}"
      register: rack_del2
      when: rack_to_delete is defined

    - name: "[TEST RACK_DEL-2] Verify idempotency"
      ansible.builtin.assert:
        that:
          - rack_del2 is defined
          - rack_del2 is success
          - not rack_del2.changed
        fail_msg: "FAILED: rack_deleted is not idempotent (changed=true for already-deleted rack)"
        success_msg: "PASSED: rack_deleted is idempotent (changed=false for already-deleted rack)"
      when: rack_del2 is defined

    # ── Cleanup ───────────────────────────────────────────────────────────
    - name: "[RACK CLEANUP] Delete rack test blueprint"
      juniper.apstra.blueprint:
        id: "{{ bp_rack.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    - name: Logout of Apstra
      juniper.apstra.authenticate:
        logout: true
        auth_token: "{{ auth.token }}"
