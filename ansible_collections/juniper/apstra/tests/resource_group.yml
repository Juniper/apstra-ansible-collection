---
- name: Test update resource_group
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Get local hostname
      ansible.builtin.command: hostname
      register: local_hostname
      changed_when: false

    - name: Set blueprint name fact
      ansible.builtin.set_fact:
        blueprint_name: "test_rg_{{ local_hostname.stdout }}"

    - name: Connect to Apstra
      juniper.apstra.authenticate:
        logout: false
      register: auth

    - name: Create blueprint
      juniper.apstra.blueprint:
        body:
          template_id: "L2_Virtual_EVPN"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          label: "{{ blueprint_name }}"
        lock_state: "ignore"
        auth_token: "{{ auth.token }}"
      register: bp

    - name: Show created blueprint
      ansible.builtin.debug:
        var: bp

    - name: Get the resource_groups
      juniper.apstra.apstra_facts:
        id: "{{ bp.id }}"
        auth_token: "{{ auth.token }}"
        gather_network_facts:
          - blueprints.resource_groups
          - ip_pools

    - name: Show resource_groups
      ansible.builtin.debug:
        var: ansible_facts.apstra_facts.blueprints[bp.id.blueprint].resource_groups

    - name: Show the ip_pools
      ansible.builtin.debug:
        var: ansible_facts.apstra_facts.ip_pools

    - name: Get one resource_group
      juniper.apstra.resource_group:
        id:
          blueprint: "{{ bp.id.blueprint }}"
          group_type: "ip"
          group_name: "leaf_loopback_ips"
        auth_token: "{{ auth.token }}"
      register: rg_get

    - name: Show singular resource_group
      ansible.builtin.debug:
        var: rg_get.resource_group

    - name: Extract list of ip_pool ids
      ansible.builtin.set_fact:
        ip_pools: "{{ ansible_facts.apstra_facts.ip_pools | json_query('keys(@)') }}"

    - name: Show ip_pool_ids
      ansible.builtin.debug:
        var: ip_pools

    - name: Update resource_group
      juniper.apstra.resource_group:
        id:
          blueprint: "{{ bp.id.blueprint }}"
          group_type: "ip"
          group_name: "leaf_loopback_ips"
        body:
          description: "Updated description"
          pool_ids: "{{ ip_pools }}"
      register: rg_update

    - name: Show updated resource_group
      ansible.builtin.debug:
        var: rg_update.resource_group

    # ── Name Resolution: assign pool by display_name ───────────────

    - name: Get first IP pool display_name
      ansible.builtin.set_fact:
        first_pool_name: "{{ ansible_facts.apstra_facts.ip_pools | dict2items | first }}"

    - name: Update resource_group using pool display_name
      juniper.apstra.resource_group:
        id:
          blueprint: "{{ bp.id.blueprint }}"
          group_type: "ip"
          group_name: "leaf_loopback_ips"
        body:
          pool_ids:
            - "{{ first_pool_name.value.display_name }}"
      register: rg_name_update

    - name: Verify pool name resolution in resource_group
      ansible.builtin.assert:
        that:
          - rg_name_update is not failed
        fail_msg: "Pool display_name resolution failed in resource_group"
        success_msg: "PASSED: Pool name resolution in resource_group"

    # ── Name Resolution: access resource_group via blueprint label ──

    - name: Get resource_group using blueprint label
      juniper.apstra.resource_group:
        id:
          blueprint: "{{ blueprint_name }}"
          group_type: "ip"
          group_name: "leaf_loopback_ips"
        auth_token: "{{ auth.token }}"
      register: rg_by_label

    - name: Verify blueprint label resolution in resource_group
      ansible.builtin.assert:
        that:
          - rg_by_label is not failed
          - rg_by_label.resource_group is defined
        fail_msg: "Blueprint label resolution failed in resource_group"
        success_msg: "PASSED: Blueprint label resolution in resource_group"

    - name: Delete blueprint
      juniper.apstra.blueprint:
        id: "{{ bp.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    - name: Logout of Apstra
      juniper.apstra.authenticate:
        logout: true
        auth_token: "{{ auth.token }}"
