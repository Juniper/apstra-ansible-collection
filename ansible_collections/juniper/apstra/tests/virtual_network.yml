---
- name: Test create/update/delete virtual_network
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Get local hostname
      ansible.builtin.command: hostname
      register: local_hostname
      changed_when: false

    - name: Set blueprint name fact
      ansible.builtin.set_fact:
        blueprint_name: "test_vn_{{ local_hostname.stdout }}"

    - name: Connect to Apstra
      juniper.apstra.authenticate:
        logout: false
      register: auth

    - name: Create blueprint
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2_Virtual"
        lock_state: "ignore"
        auth_token: "{{ auth.token }}"
      register: bp

    - name: Show created blueprint
      ansible.builtin.debug:
        var: bp

    - name: Show auth.token
      ansible.builtin.debug:
        var: auth.token

    # - name: Get the systems
    #   juniper.apstra.apstra_facts:
    #     id: "{{ bp.id }}"
    #     gather_network_facts:
    #       - 'blueprints.nodes'
    #     filter:
    #       blueprints.nodes: 'node_type=system'
    #     auth_token: "{{ auth.token }}"

    # - name: Show the systems
    #   ansible.builtin.debug:
    #     var: ansible_facts.apstra_facts.blueprints[bp.id.blueprint].nodes

    # - name: Filter nodes with role leaf
    #   ansible.builtin.set_fact:
    #     leaf_nodes: >-
    #       {{
    #         ansible_facts.apstra_facts.blueprints[bp.id.blueprint].nodes
    #         | dict2items
    #         | selectattr('value.role', 'equalto', 'leaf')
    #         | map(attribute='key')
    #         | list
    #       }}

    # - name: Show leaf nodes
    #   ansible.builtin.debug:
    #     var: leaf_nodes

    # - name: Use the leaf_nodes to set the svi_ips
    #   ansible.builtin.set_fact:
    #     svi_ips: >-
    #       {{
    #         leaf_nodes | map('community.general.dict_kv', 'system_id') | map('combine', {
    #           'ipv4_mode': 'enabled',
    #           'ipv4_addr': None,
    #           'ipv6_mode': 'disabled',
    #           'ipv6_addr': None
    #         }) | list
    #       }}

    # - name: Show svi_ips
    #   ansible.builtin.debug:
    #     var: svi_ips

    # - name: Use the leaf_nodes to set the bound_to
    #   ansible.builtin.set_fact:
    #     bound_to: >-
    #       {{
    #         leaf_nodes | map('community.general.dict_kv', 'system_id') | map('combine', {
    #           'access_switch_node_ids': []
    #         }) | list
    #       }}

    # - name: Show bound_to
    #   ansible.builtin.debug:
    #     var: bound_to

    - name: Create virtual_network
      juniper.apstra.virtual_network:
        id: "{{ bp.id }}"
        body:
          label: "test_virtual_network"
          description: "test VN description"
          ipv4_enabled: true
          virtual_gateway_ipv4_enabled: true
          vn_id: "16777214"
          vn_type: "vxlan"
          dhcp_service: "dhcpServiceEnabled"
          # svi_ips: "{{ svi_ips }}"
          # bound_to: "{{ bound_to }}"
        auth_token: "{{ auth.token }}"
      register: vn

    - name: Show created virtual_network
      ansible.builtin.debug:
        var: vn

    - name: Create virtual_network (no change)
      juniper.apstra.virtual_network:
        id: "{{ bp.id }}"
        body:
          label: "test_virtual_network"
          description: "test VN description"
          ipv4_enabled: true
          virtual_gateway_ipv4_enabled: true
          vn_id: "16777214"
          vn_type: "vxlan"
        auth_token: "{{ auth.token }}"

    - name: Modify virtual_network
      juniper.apstra.virtual_network:
        id: "{{ vn.id }}"
        body:
          description: "test VN description edwin wuz here"
        auth_token: "{{ auth.token }}"

    - name: Delete the virtual_network
      juniper.apstra.virtual_network:
        id: "{{ vn.id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: vn_delete

    - name: Show deleted virtual_network
      ansible.builtin.debug:
        var: vn_delete

    # ── Name Resolution: create VN via blueprint label ────────────

    - name: Create virtual_network using blueprint label
      juniper.apstra.virtual_network:
        id:
          blueprint: "{{ blueprint_name }}"
        body:
          label: "test_vn_by_name"
          vn_type: "vxlan"
        auth_token: "{{ auth.token }}"
      register: vn_by_name

    - name: Verify VN creation via blueprint label
      ansible.builtin.assert:
        that:
          - vn_by_name is not failed
          - vn_by_name.id.virtual_network is defined
        fail_msg: "Blueprint label resolution failed in virtual_network"
        success_msg: "PASSED: Blueprint label resolution in virtual_network"

    - name: Delete VN created by name
      juniper.apstra.virtual_network:
        id: "{{ vn_by_name.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    # ── Feature: top-level vlan_id with no bound_to (pass-through) ────────────
    # When bound_to is absent, vlan_id should be forwarded to the API as a
    # VN-level field exactly as before (int-coerced from a possible string).

    - name: Create VN with top-level vlan_id and no bound_to
      juniper.apstra.virtual_network:
        id:
          blueprint: "{{ blueprint_name }}"
        body:
          label: "test_vn_vlan_passthrough"
          vn_type: "vxlan"
          vlan_id: "42"   # intentional string — module must coerce to int
        auth_token: "{{ auth.token }}"
      register: vn_vlan_passthrough

    - name: Verify pass-through VN creation succeeded
      ansible.builtin.assert:
        that:
          - vn_vlan_passthrough is not failed
          - vn_vlan_passthrough.id.virtual_network is defined
        fail_msg: "global vlan_id pass-through (no bound_to) test FAILED"
        success_msg: "PASSED: global vlan_id pass-through (no bound_to)"

    - name: Delete VN (vlan_id pass-through test)
      juniper.apstra.virtual_network:
        id: "{{ vn_vlan_passthrough.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    # ── Feature: global vlan_id consumed when bound_to is present ────────────
    # With bound_to supplied the top-level vlan_id must be popped from body
    # (not forwarded to the API) and applied per-entry.  The blueprint created
    # here has no real leaf systems so we validate that the module pre-processing
    # runs without error using an empty bound_to list.

    - name: Create VN with global vlan_id and empty bound_to (no-op expansion)
      juniper.apstra.virtual_network:
        id:
          blueprint: "{{ blueprint_name }}"
        body:
          label: "test_vn_global_vlan"
          vn_type: "vxlan"
          vlan_id: 100
          bound_to: []
        auth_token: "{{ auth.token }}"
      register: vn_global_vlan

    - name: Verify VN with global vlan_id + empty bound_to succeeded
      ansible.builtin.assert:
        that:
          - vn_global_vlan is not failed
          - vn_global_vlan.id.virtual_network is defined
        fail_msg: "global vlan_id with empty bound_to FAILED"
        success_msg: "PASSED: global vlan_id consumed and not forwarded to API"

    - name: Idempotency check — no change on re-run
      juniper.apstra.virtual_network:
        id: "{{ vn_global_vlan.id }}"
        body:
          label: "test_vn_global_vlan"
          vn_type: "vxlan"
          vlan_id: 100
          bound_to: []
        auth_token: "{{ auth.token }}"
      register: vn_global_vlan_idemp

    - name: Verify idempotency (changed == false)
      ansible.builtin.assert:
        that:
          - not vn_global_vlan_idemp.changed
        fail_msg: "global vlan_id idempotency FAILED (unexpected change)"
        success_msg: "PASSED: global vlan_id idempotency OK"

    - name: Delete VN (global vlan_id test)
      juniper.apstra.virtual_network:
        id: "{{ vn_global_vlan.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    # NOTE: Tests for ESI pair expansion (bound_to with a redundancy_group label)
    # and global vlan_id with real leaf nodes require a testbed with actual managed
    # devices and are covered by integration tests, not the unit test blueprint here.

    - name: Delete blueprint
      juniper.apstra.blueprint:
        id: "{{ bp.id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: blueprint_delete

    - name: Show deleted blueprint
      ansible.builtin.debug:
        var: blueprint_delete

    - name: Logout of Apstra
      juniper.apstra.authenticate:
        logout: true
        auth_token: "{{ auth.token }}"
