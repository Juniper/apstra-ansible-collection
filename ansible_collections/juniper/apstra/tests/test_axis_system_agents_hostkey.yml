---
################################################################################
# AXIS System Agents — Host Key Update Test
#
# Tests the new state=host_key_updated on juniper.apstra.system_agents.
#
# Phase 1: state=gathered            — discover agents (read-only)
# Phase 2: host_key_updated          — force_accept=false, agent connected
#                                      → idempotent no-op (safe)
# Phase 3: host_key_updated          — check mode, force_accept=true
#                                      → reports would-clear (safe)
# Phase 4: host_key_updated          — force_accept=true, ACTUAL run
#                                      Clears authorized_key field on agent.
#                                      Safe on healthy connected devices.
#
# ⚠️  Phase 4 modifies agent configuration (clears the stored host key).
#     Devices remain connected — this only removes the cached key so the
#     next connection re-validates.  Disabled unless run_actual=true.
#
# Usage (safe — phases 1-3 only):
#   pipenv run ansible-playbook -v test_axis_system_agents_hostkey.yml
#
# Usage (with Phase 4 actual run):
#   pipenv run ansible-playbook -v test_axis_system_agents_hostkey.yml \
#     -e run_actual=true
#
# Target a specific agent:
#   pipenv run ansible-playbook -v test_axis_system_agents_hostkey.yml \
#     -e run_actual=true \
#     -e target_agent_ip="192.158.159.11"
#
# Credentials: loaded automatically from .env (APSTRA_API_URL / USERNAME / PASSWORD)
################################################################################

- name: "AXIS System Agents — Host Key Update Test"
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    # Phase 4 — set run_actual=true to run the actual host key clear
    run_actual: false
    # Optionally pin a specific agent by management IP (uses first connected if not set)
    target_agent_ip: ""

  tasks:
    ########################################################################
    # Phase 1 — state=gathered: Discover all agents
    ########################################################################
    - name: "Phase 1 — Gather all system agents"
      juniper.apstra.system_agents:
        state: gathered
      register: p1

    - name: "Phase 1 — Assert: gathered succeeds"
      ansible.builtin.assert:
        that:
          - not p1.failed | default(false)
          - not p1.changed
          - p1.agents is defined
          - p1.agents | length > 0
        success_msg: >-
          PASSED Phase 1: found {{ p1.agents | length }} agent(s).
        fail_msg: "Phase 1 FAILED: state=gathered returned no agents"

    - name: "Phase 1 — Show agents"
      ansible.builtin.debug:
        msg: |
          System agents ({{ p1.agents | length }}):
          {% for a in p1.agents %}
            id={{ a.agent_id }}
            ip={{ a.management_ip | default('?') }}
            state={{ a.connection_state | default('?') }}
            authorized_key={{ a.authorized_key | default('(none)') }}
          {% endfor %}

    - name: "Phase 1 — Pick target agent by IP (when provided)"
      ansible.builtin.set_fact:
        target_agent: "{{ p1.agents | selectattr('management_ip', 'eq', target_agent_ip) | list | first }}"
      when: target_agent_ip | length > 0

    - name: "Phase 1 — Pick first connected agent (when no IP specified)"
      ansible.builtin.set_fact:
        target_agent: "{{ p1.agents | selectattr('connection_state', 'eq', 'connected') | list | first }}"
      when: target_agent_ip | length == 0

    - name: "Phase 1 — Assert: target agent resolved"
      ansible.builtin.assert:
        that:
          - target_agent is defined
          - target_agent.agent_id is defined
        success_msg: >-
          PASSED Phase 1b: target agent = {{ target_agent.agent_id }}
          ({{ target_agent.management_ip | default('?') }}).
        fail_msg: "Phase 1b FAILED: could not resolve target agent"

    ########################################################################
    # Phase 2 — force_accept=false when connected → no-op (SAFE)
    ########################################################################
    - name: "Phase 2 — host_key_updated with force_accept=false (connected agent)"
      juniper.apstra.system_agents:
        id:
          agent_id: "{{ target_agent.agent_id }}"
        body:
          force_accept: false
        state: host_key_updated
      register: p2

    - name: "Phase 2 — Assert: no-op when connected and force_accept=false"
      ansible.builtin.assert:
        that:
          - not p2.failed | default(false)
          - not p2.changed
          - "'already connected' in p2.msg | lower
            or 'no stored host key' in p2.msg | lower
            or 'no key' in p2.msg | lower"
        success_msg: >-
          PASSED Phase 2: force_accept=false correctly no-ops for connected agent
          {{ target_agent.agent_id }}.
        fail_msg: "Phase 2 FAILED: {{ p2.msg | default('no msg') }}"

    - name: "Phase 2 — Show no-op result"
      ansible.builtin.debug:
        msg: "Phase 2 result: changed={{ p2.changed }}  msg={{ p2.msg }}"

    ########################################################################
    # Phase 3 — Check mode with force_accept=true (SAFE)
    ########################################################################
    - name: "Phase 3 — Check mode host_key_updated (force_accept=true)"
      juniper.apstra.system_agents:
        id:
          agent_id: "{{ target_agent.agent_id }}"
        body:
          force_accept: true
        state: host_key_updated
      check_mode: true
      register: p3

    - name: "Phase 3 — Assert: check mode reports would-clear"
      ansible.builtin.assert:
        that:
          - not p3.failed | default(false)
          - p3.changed
          - "'check mode' in p3.msg | lower"
        success_msg: >-
          PASSED Phase 3: check mode correctly reports would-clear host key for
          agent {{ target_agent.agent_id }}.
        fail_msg: "Phase 3 FAILED: {{ p3.msg | default('no msg') }}"

    - name: "Phase 3 — Show check mode result"
      ansible.builtin.debug:
        msg: "Check mode host_key_updated: {{ p3.msg }}"

    ########################################################################
    # Phase 3b — Check mode with management IP (SAFE)
    ########################################################################
    - name: "Phase 3b — Check mode host_key_updated by management_ip"
      juniper.apstra.system_agents:
        id:
          management_ip: "{{ target_agent.management_ip }}"
        body:
          force_accept: true
        state: host_key_updated
      check_mode: true
      register: p3b

    - name: "Phase 3b — Assert: IP-based lookup works in check mode"
      ansible.builtin.assert:
        that:
          - not p3b.failed | default(false)
          - p3b.changed
          - p3b.agent_id == target_agent.agent_id
        success_msg: >-
          PASSED Phase 3b: management_ip lookup resolved to agent {{ p3b.agent_id }}.
        fail_msg: "Phase 3b FAILED: {{ p3b.msg | default('no msg') }}"

    - name: "Phase 3b — Show IP-based result"
      ansible.builtin.debug:
        msg: >-
          IP {{ target_agent.management_ip }} →
          agent_id={{ p3b.agent_id }}  msg={{ p3b.msg }}

    ########################################################################
    # Phase 4 — ACTUAL host key clear (disabled by default)
    ########################################################################
    - name: "Phase 4 — Actual host_key_updated (force_accept=true)"
      juniper.apstra.system_agents:
        id:
          agent_id: "{{ target_agent.agent_id }}"
        body:
          force_accept: true
        state: host_key_updated
      register: p4
      when: run_actual | bool

    - name: "Phase 4 — Assert: host key cleared"
      ansible.builtin.assert:
        that:
          - not p4.failed | default(false)
          - p4.changed
          - p4.agent_id == target_agent.id
        success_msg: >-
          PASSED Phase 4: host key cleared for agent {{ p4.agent_id }}.
        fail_msg: "Phase 4 FAILED: {{ p4.msg | default('no msg') }}"
      when: run_actual | bool and p4 is not skipped

    - name: "Phase 4 — Verify idempotency: run again immediately"
      juniper.apstra.system_agents:
        id:
          agent_id: "{{ target_agent.agent_id }}"
        body:
          force_accept: false
        state: host_key_updated
      register: p4_idem
      when: run_actual | bool and p4 is not skipped and not p4.failed | default(false)

    - name: "Phase 4 — Assert: second run with force_accept=false is no-op"
      ansible.builtin.assert:
        that:
          - not p4_idem.failed | default(false)
          - not p4_idem.changed
        success_msg: "PASSED Phase 4b: second run correctly no-ops."
        fail_msg: "Phase 4b FAILED: {{ p4_idem.msg | default('no msg') }}"
      when: run_actual | bool and p4_idem is defined and p4_idem is not skipped

    - name: "Phase 4 — Skipped (not enabled)"
      ansible.builtin.debug:
        msg: >-
          Phase 4 SKIPPED: set -e run_actual=true to run the actual
          host key clear for agent {{ target_agent.agent_id }}
          ({{ target_agent.management_ip | default('?') }}).
      when: not run_actual | bool

    ########################################################################
    # Summary
    ########################################################################
    - name: "Summary"
      ansible.builtin.debug:
        msg:
          - "Phase 1 (gathered):            PASSED — {{ p1.agents | length }} agent(s), target={{ target_agent.agent_id }}"
          - "Phase 2 (force_accept=false):  {{ 'PASSED' if not p2.failed | default(false) else 'FAILED' }} — {{ p2.msg }}"
          - "Phase 3 (check mode):          {{ 'PASSED' if not p3.failed | default(false) else 'FAILED' }}"
          - "Phase 3b (check by ip):        {{ 'PASSED' if not p3b.failed | default(false) else 'FAILED' }}"
          - "Phase 4 (actual clear):        {{ 'PASSED' if run_actual | bool and p4 is defined and p4 is not skipped and not p4.failed | default(false) else 'SKIPPED (disabled)' }}"
